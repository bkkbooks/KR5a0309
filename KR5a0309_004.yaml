front:
  text: 歷世真仙體道通鑑續編卷之四羽四
  hash: sha256:0639fceb7d61b5f0834c78ab7db5abd1d1f9ae4ceb861de7ca04677002b6cdb6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0309_HFL_004-001a, image: hfl/0149/0149-132.png}
body:
  text: 浮雲山聖壽萬年宮道士趙道一編修薩守堅薩真人名守堅南華人也一云西河人自稱汾陽薩客少有濟人利物之心嘗學醫誤用藥殺人遂棄醫聞江南三十代天師虛靜先生及林王二侍宸道法之高欲求學法出蜀至陜行囊已盡方坐石悶忽見三道人來薩問此去信州遠近道人問所欲薩云欲訪虛靜天師參學道法道人曰天師羽化矣薩方悵恨一道人云今天師道法亦高吾與之有舊當為作字可往訪之吾有一法相授日間可以自給遂授以呪棗之術曰呪一棗可取七文一日但呪十棗得七十文則有一日之資矣一道人云吾亦有一法相授與之棕扇一柄曰有病者則搧之即愈一道人云吾亦有一法相授乃雷法也薩拜而受之用之皆驗一日凡呪百餘棗止取七十文為日用餘者復以濟貧及到信州見天師投信舉家慟哭乃三十代天師親筆也信中言吾與林侍宸王侍宸遇薩某各以一法授之矣可授以未盡之文薩由是道法大顯嘗寓某處城隍廟數日太守夢城隍告之曰薩先生數日寓此令我起處不安幸為我善遣之太守至廟逐薩使去薩行數十里遇人舁豕往廟酬願薩以少香附之曰去酬願畢為置爐焚之其人如誡迅雷一聲火焚其廟更不延燒民居越三年薩至某渡無操舟者舉篙自渡置三文錢於舟中以償渡金因掬水浣手見一人鐵冠紅袍手執玉斧立於水中薩訶之曰汝乃何人速見形其人立於側曰我王善即某州城隍也昨真官焚我廟我家三百餘口無依我實無罪訴于上帝帝賜玉斧令我相隨遇真官有犯天律令得便宜施行後奏我隨真官三年并無犯律者今日渡舟真官乃置錢舟中則真官無可報之時矣今願為部將奉行法旨薩曰更相從三年亦只如是薩遂奏玉帝擢為部將每有行持報應若響嘗有詩云道法於身不等間尋思戒行徹心寒千年鐵樹開花易一日酆都出世難又詩云言清行濁休談道不顧天條法謾行但依本分安神氣何慮仙都不挂名真人得道後遊閩中一日端坐而化趙麻衣趙麻衣不知何許人也唐僖宗時黃巢盜起麻衣避於終南山見道人數十居山間麻衣無所得食願為傭役由是有所遇而得道宋高宗建炎初始來遊青城山久之乃入成都玉局化以擡篨為屋而居常服麻縷百結之衣人因號為麻衣形臞如稿木而骨不露神采湛然書出見凡草木之立者行掇之暮歸則掇橫於道人莫究其意亦不見其有所飲食也人有具酒茗邀之或不顧或為留以飲餘者授人人飲之覺芬洌異常麻衣時時言及五代及本朝事亹亹有條理或窮詰之則於庋上取圓覺經示之曰盡在是矣達官貴人招之未嘗往也或云五代嘗為兵已而免去帖尚存平生黧黑一旦趺坐而化尺宅肢體潔白如玉然劉居中劉居中京師人少時隱於嵩山居山巔最深處曰控鶴庵初與兩人同處率一兩月輒下山覓糧登陟極艱苦往往躋攀葛藟窮日力而至兩人不堪其苦皆舍去獨劉居之自若凡二十年遭亂南來宋高宗紹興間嘗召入宫賜沖靜處士後廬於豫章之東湖每為人言昔日事云嵩山峻極處有平地可為田者百畝别有小山巖岫之屬常時雲雨只在半山間大蜥蜴數百皆長三四尺人以食就手飼之撫摩其體膩如脂一日聚繞盎邊各就取水才入口即吐出已圓結如彈丸積之于側俄頃間纍纍滿地忽震雷一聲起彈丸皆失去明日山下人來言昨正午雨雹大作乃知蜥蜴所為者此也又聞石壁間老人讀書聲逼而聽之寂然既退復爾其後石壁摧得異書甚多陰陽方技修真黃白之學無所不有既下山獨取其首尾全者數篇餘悉焚之又嘗聞異香滿室經日乃散不知所從來也劉生於神宗元豐七年甲子百餘歲矣不知所終譙定譙先生名定字天授涪州樂溫縣玉溪人深於易學隱青城大面山中得道宋高宗建炎初以經行召至揚州欲留之講筵不可拜通直郎直祕閣致仕今百數十餘歲巢居險絶人不能到而先生數年輒一出至山前人有見之者姚平仲隱青城大面山姚平仲字希晏宋欽宗靖康初在圍城中夜將死士攻敵營不利騎駿騾逸去高宗建炎初所在揭榜以觀察使召之竟不出孝宗淳熙甲午乙未間乃有人見之於青城山丈人觀道院年近九十髭髯長委地喜作草書蓋已得成仙云崔羽先生姓崔名羽唐州人少隸京師班直休官樂道自號紫霞宋高宗紹興間遊羅浮已老矣初不自言其年朱顏方瞳舉心林野性喜酒人具饌邀之飲則醉醉則歌然歌中所言休咎皆驗後居東莞數年一夕命道流設醮于上清觀禮畢命酌西室酬酢笑語若對客者人問之曰鍾吕陳三先生會于此既徹爵奄然端坐而逝縣人共迎置於紫霞亭焚之有蝴蝶徑尺自烈焰中騰空而去是日鄉人有識之者於榴花渡見其東歸蓋歸羅浮也劉浩然宋高宗紹興中虞允文侍其父漕潼川父病允文齋戒浹日命道人劉浩然奏章請命劉亦素以精慤著名自子夜登壇遲明方興言曰適之帝所見几上書章內兩句云乞減臣之年增父之算帝指示曰虞允文至孝可與執政已而其父竟卒後有十八年允文果然參大政以符其言段段字德瑱袁州萬載人略知書天性淳謹未嘗忤物然遇不平事則奮臂而前宋高宗建炎間寇盜充斥段氏族屬四十口皆為所剽𤪒挺身持金帛往贖賊嘆其重義皆付之使歸紹興五年東南處處大旱斗米過千錢𤪒盡發宿藏止取常值又為粥以食飢者賴活者不可勝計後忽厭人事結庵於嚴田之山中壁間多書坦蕩二字一旦召會親舊與敘訣曰不久天帝召我人不以為然經數日陲樓鳴鐘欻然凌雲而去鄉人走視所居惟弊衣履存衆欲以其事上於朝而邑官不樂者止之遂已饒廷直饒廷直字朝弼建昌南城人第進士豪俊有氣節宋高宗紹興七年以事過武昌有所遇自是不邇妻妾翛然端居如林下道人自作詩紀其事云丁已中秋夜半偶遊黃鶴樓忽遇異人授以祕訣所恨尚牽世故未能從事於斯也因作詩以識之其辭曰黃鶴樓前秋月寒樓前江闊煙漫漫夜深雲散萬籟息獨對清影憑闌干一聲長嘯肅天宇知是飧霞御風侣多生曾結香火緣邂逅相逢竟相語翛然洗盡朝市忙直疑身在無何鄉回看往事一破甑下視舉世俱亡羊嗟豫局促猶軒冕知是盧敖遊未遠他年有約願追隨共看蓬萊水清淺後二年歲在庚申朝廷復江南以為鄧州通判金人叛盟鄧城陷死之後載其柩還鄉舁者覺甚輕然無敢發驗者人以為尸解仙去云蘇庠丹陽蘇養直名庠居後湖暮年徙潤州太湖馬迹山宋高宗紹興十四年甲子十一月中病酒困卧所使村童徐行者持謁扣床曰有客稱江宣贊欲求見視其謁云惠州羅浮山水簾洞長生道人江觀潮兩畔各寫詩一句曰富貴易逢日月短此中難遇是長生蘇悅其語強起延之客曰羅浮黃真人黃真人晉時為惠州太守棄官入羅浮山水簾洞以君不欲世間聲利姓名已書仙籍命我持丹授君蘇時年八十矣應之曰庠平生未識真人又形骸已壞何以丹為哉客曰此非五金八石之比蓋真人真氣所化也服之無嫌蘇視客衣服侈麗類貴遊而言辭鄙俗無藴藉甚惡之冀速去曰雖然終不願得也老病缺於承迎當令兒曹奉陪客曰我專為君來君不欲丹當復持以歸但路絶遠願借一宿明旦晴即去不然須少留也不獲已命館於松菊墅時天久晴五更大雨作蘇憶昨日語頗悔亟邀致具酒未及飲蘇曰丹可見否客喜便於腰間篋中取授蘇連云且延一紀藥僅如豆大黃紫色亦不作丸劑客曰困篤則服之方可見效凡身有疾但敬想丹力所行至即愈餌此者當飛升度世若情欲未畢故自延一紀壽壽終亦為仙官矣酒數行適既僕牽驢過前客曰此驢昔嘗為人叱令笑驢即笑又求青箬笠中鹽以飼之祝曰復為人去再叱令笑又笑坐皆驚異又諭蘇畫真人像蘇曰其狀何如曰一神仙中人服黃道衣繫皂滌著琴鞋持水晶數珠挂玉瓢於右帶嘗有遇之於羅浮鐵橋懸崖雲霧間服佩正如此遂别去約五年復來來時君異於今日矣蘇以丹并刺字置笥中歲未盡五日忽大病至除夕氣絶家人以頂暖不忍殮及明諸子記前事發笥視之藥故在取投口中即能起灑然若無疾飲啖自如再令拾刺字并丹貼欲燒末飲之不復見後數日長子如京口以客言命圖黃像像成儼然江君也始悟江即黃君云蘇雖髮如霜自是其半再黑初高宗建炎中喪右目瞳子至此瞭然吳興陶安世聞其名往訪之得其所遭本末如此後二十年作書與薌林向伯共云吾可中聞異音羅浮仙人期以數年相見應盡便盡餘不復較十二月往茅山别諸道友元日聚族歡飲達旦披衣曳杖出門曰黃真人至矣其行如馳婢僕驚奔僅能挽衣襟已立化未卒之前洪慶善嘗以書求其近詩答云頃得方士神藥奪命鬼手中服食以來識詩結字無復餘習慶善敘其詩文實載此語陶安世作記甚備焉馮觀國馮觀國郡武人幼敏悟讀書既冠意若有所厭即棄鄉里遊方外遇異人得導引內丹之法凡天文地理性命禍福之妙不學而精乃晦名氏自稱無町畦道人寓宜春二年挾術自養所言人吉凶及陰陽變化盡驗或有誚其醉飲狂怪者觀國不與較以詩謝云踏遍紅塵四百州幾多風月是良儔朝來應笑頭陀叟道不相侔風馬牛又述懷詩云落魄塵懷觸處然深藏妙用散神仙筆端間作龍蛇走壺裏長挑日月懸謾假人倫來混世只將酒盞度流年濳修功行歸何處笑指瀛洲返洞天餘詩尚多皆脫塵離俗人亦多莫能曉也有瑞州上高縣麻塘李宣卿者一夕約束門僕黃卷曰明日要五更早起看門外有何動靜來報僕唯諾而去次早凌晨開門見門外凳上有一醉道人熟睡喚之不應遂通報宅堂宣卿尋令扶起請入書院少歇令左右供給盥漱畢即請相見問其姓名來自何方並不答但再索酒急進巨觥不計其數又告飢覓飯愈食愈不言飽時宣卿故妻唐氏新葬作庵已就而未有住庵者因領道人看庵道人即欣然肯住遂給米炭等送之入庵越三日往視則所給米炭略不曾動元送火種數塊亦如故問何故曰前日喫已飽矣但夜寒覓紙衾復與之又一日入庵則見所與紙衾已裂為四以青茆縛於床四腳又問何故答曰寒從下上後因酒間忽作詩曰南北東西總是家自知身命屬煙霞只因貪戀一杯酒誤却碧桃千樹花人雖見其詩不凡然時弄小術如今之撮藥者又常喜顚酒未免以等間待之久之但聞姓馮故衆呼之曰馮顚道宣卿諸子一日入庵拜掃竟不見道人何在但見墳塋中霞光遍地舉頭望之只見道人坐于樹杪仰面向天吐氣而下尋即光燦或謂其能吸太陽精也住庵凡十八年多與宣卿諸子歡笑戲狎或出言無狀或就席顚倒矢溺不禁似此可厭者諸子頗惡之一夕有倡女佐樽諸子飲方樂道人突入席間少醉所為及亂席散諸子戲舉倡女所携之婢配之鎖二人置樓上翼早啓視則無道人矣惟婢云鑰門之後滿樓之熱如火不容近其身夜半稍涼聞虛空樂作近五更楝間簌簌有聲言訖諸子就怪所為舉目視梁間則有字題其楝云水非溝壑龍方卧木是梧桐鳳始栖莫道男兒無去路碧霄雲外有仙梯翌早元僕黃卷在袁州遇道人于市云夜來衆官人取笑太惡五更我已過此就寄聲云後會要相見可來宜春臺下相探是日午時滿城哄傳臺下有道人坐化黃卷往視之即馮顚道也遂歸報其主宋高宗紹興三十二年三月十四日也先是道人遍往辭知舊且寄詩言别至日端坐作頌而逝頌云平生無町畦任真但落魄爛醉是生涯天地為棺槨其時儀真李觀民為袁州太守乃其舅氏方認得是其甥本姓馮名觀國年十八領薦往赴省後竟不歸於此方見遂命塑其身於城東之治平宫宣卿有子名德謙者往視之撫其背云道人何不分曉一别而去忽回頭相顧至今塑像猶左顧也其師王蒙道人其侣方七道人往來詩詞甚多趙縮手趙縮手者不知其名本普州士人也少年時父母與錢令買書於成都及半途有方外之遇遂棄家出遊至宋高宗紹興末蓋百餘歲矣喜來彭漢間行則縮兩手於胸前以是得名人延之食不以多寡輒盡飲酒自一杯至百杯皆不辭或終日不飲食亦怡然自樂嘗於醉中言文潞公入蜀中歷歷有本末他日復詢之曰不知也黃仲秉家寫其真事之成都人房偉為贊云養氣近術談道近禪被褐懷玉其樂也天欲去即去欲住即住縮手袖間孰測其故趙見而笑曰養氣安得謂之術禪與道一也安有二我縮手於胸非袖間也取筆續曰似驢無觜似牛無角文殊普賢摸索不著又自贊曰紅塵白雲堆裏好箇道人活計無事東行西行有時半醒半醉相逢大笑一場不是胡歌虜沸除非同道方知同道世間有幾綿竹人袁仲舉久病起遇趙過門邀入飲以酒問曰吾疾狀如此先生將奈何趙不答但歌詞一闋云我有屋三間柱用八山周回四壁海遮闌萬象森羅為斗栱瓦蓋青天無漏得多年結就因緣修成功行滿三千降得火龍伏得虎陸地神仙云此吕洞賔所作也吾亦有一篇又歌曰損屋一間兒好與支持休教風雨等間欺覓箇帶修安穩路莫遣人知休更著便宜下手知時要知險裏却防危透得玄關歸去路方步雲梯歌罷滿飲數杯無言而去仲秉正與偕行徐問其故曰觀吾詞意可見矣後旬日袁死什邡縣風俗每以正月作衛真人生日道衆畢會趙亦往寓於居人謝氏先一夕告之曰住君家不為便假我此榻吾將有所之拂旦徑趨對門小寺得一室正榻趺坐傍人怪其不言就視已化矣會者數千人爭先來觀以香火致敬越三日火化其骨鈎聯如鎖子云寇子隆青城山相去三十里麻姑洞相傳云亦姑修真處也丈人觀道士寇子隆獨往瞻謁至中途遇村婦數輩自山中擔蘿蔔而出弛簷牽裳就道上清泉跣足洗菜見子隆至問尊師何往曰將謁麻姑一婦笑曰姑今日不在山無用去遂取蘿蔔一顆授子隆曰可食此子隆食之遂行竊自念曰彼皆村野愚婦豈識麻姑為何人得非戲我邪忽焉如悟回首視之無所見矣自是神清氣全老無疾病每為人章醮自稱火部尚書壽過百歲宋孝宗隆興中羽化矣傅得一師諱得一字寧道又字齊賢清江新淦人也姓傅氏師之父某尤篤志道術偕師之母盧氏俱有隱操初聞邑之陽有護國劉仙師壇觀多靈異間有仙隱於其山中心竊慕之遂卜居於山之下宋徽宗政和五年乙未九月哉生魄忽紅光繞舍鄰里驚而異之翌日而師降誕未及月而舉動岐嶷有若髫齔年十一失怙恃里人有嚴縣丞矜其少孤收育於家是年師以生朝往拜劉仙師回至半山見茂林修竹中有六道人圍棋飲於磐石之上師欲就觀徘徊不得其徑而入忽一老者顧而指示之乃得至石傍頃之老人贈以一楂子厲聲謂曰酒不得飲師唯唯執楂子嚙之味苦澀不可食遂懷以歸行一里許乃擲於道傍其家以師久不回遣人尋索經宿乃得之詢其所由師具以告其家與鄰里之好事者異之競隨師登山令指示其所惟見荆榛荒翳無復向時之境回至所棄楂子之地則既夕矣紅光燦然人謂寶藏發見爭前取之光亦尋滅猶聞異香芬馥師曰早間道人與我楂子尚在此復取而食味益苦還擲之而去自覺神氣清爽行步如飛遂能預知休咎所居去邑十里師嘗一日十往返語言狂怪歌笑自若或滿頭戴花或醉卧橋路人莫能測市人有惡之者以毒酒推而溺諸縣橋之下師隨流出沒二里許登岸復入市笑謂溺之者曰何相戲之酷耶人始訝其異後屢試之復然衆乃驚服稱為傅仙時師年十八忽起江湖之興被蓑笠荷瓢囊遍走湖廣淮浙間名山福地歷不遊歷或孤栖巖谷或露宿叢祠所至放誕不自檢束如在新淦時人皆謂之狂生然言人之災福輒應士大夫益多奇之張魏公浚留守建康召師與語即蒙殊遇丞相史公浩嘗有詩贈師云試問此行何所止烏有鄉中無住里醉時不覺醒時癡世人誰識顚道士異時又贈之詩曰相識三十年身顚心不顚有人還會得即是地行仙後所贈益多初史越王未當國時與同省諸公宴集師偶遇之衆中遽呼公曰傅道人獨許你某年月日作相公他日幸無相忘後果如期拜相師一日造府門即延之上座酌以酒自是往來無間忽一日大醉跣而入府遽以泥足穿丞相履手作執板狀四顧歡呼公問其所欲師云要鶴氅著公識其意諾之會楊和正適來謁公遂薦之和正是夕夢一異人來見翌日王招之見其儀狀儼如夢中王與語大喜即贈以敕牒衣號副焉遂禮管轄徂慶章為師隸湖州武康縣常清觀觀王所建也忽一日持其度牒詣和正曰野鶴孤雲狂性復作不能坐受束縛請從此辭和正大笑乃貽書觀中以師散人當處之以規矩之外復月遺以醇酒居無何拂袖而去王遣藍輿遺燼之物追路與之師一無所受遂徑還清江時郡守嚴陵吳公聞師名久一見大悅舉家待以師禮師不肯留乃強延以玉笥山承天宫二職非其好也未幾復請管轄閣皂山崇真宫曾不期月大師朱公以玉隆萬壽宫管轄招之已而顯謨沈公鎮豫章與漕使少卿魯公寶文任公移管轄鐵柱延真宫孝宗乾道九年癸巳晦庵朱文公為扁雲庵二大字及贈一絶句云到處逢人説傅顚相看知是幾生前直携北斗傾天漢去作龍宫第二仙其後范石湖大參張公樞使諸賢題贈不可勝紀淳熙元年甲午史越王帥閩一日師遽呼徒弟葉永壽曰我欲福州見丞相次早遂行於時繪像求贊王在前師傍立竟諾所請書於三山郡齋留之數月因奏薦于德壽殿是年四月奉聖旨宣召師每自洪都至行在不三日可到三山距京將二千里師亦然躬詣內殿賜齋并銀絹物及御書寶扇一握靈寶大師度牒等是月十五日師上謝表師雖有此奇遇而略不動心未幾辭歸住延真凡二十載其臧否人物言必有中如龍圖韓公總江夏之師侍郎李公將江西之漕皆先期以告其預知多此類有自錢塘附師書至清江者亦三日而達師或一日應數家之供同時俱至人謂師得費長房縮地薊子訓分形之術未知其果然否耶師性曠達不親世務雖屢典殊庭充位而已夜多不寐亦有時默坐不出盡月雖猖狂妄行而志尚清潔出入公卿之門每以為善自愛勸誘其人人亦以此敬之淳熙十五年戊申十一月二十二日呼其門人囑以後事命筆題頌曰平生膽氣清高抱道長樂道遙天地陰陽反覆雲收霧捲丹霄頌竟擲筆而化享年七十有四凡度弟子門人以明年正月壬寅瘞劍於府東門之外朱砂岡會葬者千餘人謝觀復跋云初師之生人謂不孕而育其母亦自以為然嘗考之仙傳雖至人降世託迹同凡亦必假陰陽之氣三元充養以成兹有質之軀是故混元未誕先降日精於玄妙瞿曇將生必夢白象於莫耶固未聞不妊而字者如其異人託化於世母不自覺容或有之所以老子八十一年元君不覺其久莊公寤生薑氏疑非己産故師之處身應物皆非學門師承所得諒由是也嘗聞許碏有詩云閬苑花前是醉鄉滔翻阿母九霞觴群仙指點嫌輕薄謫向人間作酒狂師殆其庶幾乎不然老仙何以切戒其飲正慮其狂態復作耳謝守灝昔與之遊甚密謹略托其大概後之君子欲考其詳則有史越王之墓志在云張宗元張宗元河北霸州人也入青城大面山中峯紫柏嶺結茅耿介有守居山五十年傍無給侍常與虎豹蛇虺雜居恬不為害宋孝宗淳熙十四年八月二十九日無疾而化歷世真仙體道通鑑續編卷之四
