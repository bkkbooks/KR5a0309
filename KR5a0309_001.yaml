body:
  text: 浮雲山聖壽萬年宮道士趙道一編修王嚞師名嚞字知名號重陽子京兆咸陽人遷終南之劉蔣村母感異夢而妊二十有四月始生時宋徽宗政和二年十二月二十二日也師自幼不群及長體貌雄偉而美鬚髯倜儻尚義不拘小節弱冠業進士係學籍好屬文才思敏捷始名中孚字允卿後入道改稱焉齊改元阜昌初金太宗天會八年封劉豫為王國號齊是南宋建炎四年撫治河外不及於秦歲屢饑人至相食時咸陽醴泉惟師家富魁兩邑其大父乃出餘以賙之遠而不及者咸來劫取鄰里三百户餘亦因而侵之家財為之一空有司率兵卒捕獲將置之法師曰鄉人饑荒拾路所得吾不忍置之死地有司賢之遂釋不問人服其德金海陵煬王正隆四年師忽自嘆曰孔子四十不惑孟子四十不動心豫猶碌碌如此不亦愚乎自是之後性少檢束親戚惡之曰害風來師受而不辭關中謂狂者為害風因以自呼是年六月師醉於甘河鎮會二人被髮披璮其年貌同一師訝之從而懇請其人徐曰此子可教因授其修真口訣時年四十有八故遇師詩云四旬八上始遭逢口訣傳來便有功其所遇者蓋唐純陽子吕仙翁之化身也五年中秋再遇於醴泉師趨拜之衆笑曰言是害風安得識真仙耶其人邀師飲師問其鄉閭年姓答曰濮州人年二十二而不告其姓留祕語五篇令師讀畢焚之且曰速去東海投談捉馬已而俄失所在師乃捐棄妻孥送次女於姻家竟委而去行丐於𨝘社終南間舉止亦若狂者人莫測也後别構庵於南時村起封高數尺壙深丈餘以活死人日之又號曰行菆以方牌掛其上書云王害風靈位又於庵四隅各殖海棠梨一株同庵和公怪而問之師曰吾欲使他日四方教風為一亦如此殖三年遷居劉蔣北之水中央肆口皆塵外語鄉人素待以害風故莫審其意時復自挈壺瓢以游行歌且飲有不揆者恆隨拉飲師欣然不拒又嘗從甘河携壺酒歸一人呼曰害風肯與我否師即豫之一吸而盡令師取甘河水飲之蓋仙酎也問師云子識劉海蟾否師云是何能識得但嘗見之畫像耳乃笑而去師自此不復飲酒人或招之惟飲水而已人醉師亦醉焉俄一夕自焚其庵村里驚救之師方舞躍而歌曰數載殷勤謾居劉蔣庵中日日塵勞長豁然真火瞥然開便教燒了歸無上奉勸諸公莫生悒怏我咱别有深深况惟留灰燼不重遊蓬萊路上知來往人問其故答曰三年之後便有人來修此遂東行師嘗留題甘河云間來矯首滄溟上釣出鯨鯢未是雄又題終南山資聖宫殿壁云終南山重陽子違地肺别京兆指藍田經華嶽入南京遊海島得知友赴蓬瀛共禮本師之約嘗自寫真題其上曰來自何方去由何路一腳不移回頭即悟又自畫雲松鶴為一圖留醴泉弟子史公密收之及行辭諸道友皆與之歌詩所以寓其微意而人不悟也携鐵罐乞食而行曰我於東方有緣耳迤邐出關抵登州夜歸觀中書陜西所作詩於壁云一别終南水竹村家無兒女亦無孫三千里路尋知友引入長生不死門明旦拂衣東邁世宗大定七年七月抵寧海徑詣儒者范明叔家主人適與郡人馬宜甫邀館於私第既久重而遇之初宜甫夢其南園一鶴從地湧出師至同師擇地立庵師指鶴起之處命名全真全真之名始於此矣師欲挽西游宜甫家資巨萬久而未决其室孫氏尤難之冬十月師乃入環堵約宜甫日饋一食鎖庵百日至於分梨與芋栗令宜甫夫婦食之各有其數每分送則必以詩詞或為歌頌宜甫亦皆酬和又示神異罪福之報以警之既啓户宜甫乃始屏去塵纍改衣冠而執弟子之禮師名之曰鈺字玄寶號丹陽子曩師在宜甫宅會談玉者以宿疾來見師始拒之玉固請為弟子留宿庵中其疾頓愈玉遂黜其妻而從之師名以處端字通正號長真子繼有主公者居牛仙山聞師至來謁問答有梨遂師禮之後住鐵查山雲光洞師飛蓋致其名號名處一號傘陽子日者郝升深於易賣卜於市師入其肆背而坐焉升曰請公回頭師應聲曰君何為不回頭耶升悚然異之師出從至朝元觀師授之二詞以發至意升大感悟乃執弟子禮後至煙霞洞賜名曰璘號恬然子且以無被衣畀之未幾師領馬鈺等住崑嵛山始至指而言曰是中有煙霞洞我先世修道之所也命鑿之其器具之朽者與玉池井尚在又因取石於嶺有巨塊將墜適當其庵師厲聲叱之矻然而止山間樵蘇見者駭之時栖霞丘公年十九雖已入道未知所從而盤桓崑嵛聞師在全真庵因投謁於齊次師知其為遠器贈之以詩賜名處機字通密號長春子自此門人頗集師以罵詈笞捶磨煉之稍稍散去篤志不變者惟馬談丘而已八年八月師自烟霞遷文登姜實庵九月居縣北蘇翁庵九年四月寧海周伯通請師至則立金蓮堂金蓮會其井水舊鹹呪之而甘美俄夜有光如晝人以為火亟往視之見師行而光明隨之師嘗訓馬鈺之妻孫氏名不二號清靜散人又以天堂畫相示之五月五日令不二燒誓狀仍贈以詩又於文登立七寶會福川立三光會至登州立玉華會間遊蓬萊閣觀海大風忽起人見師隨風入海中有頃復躍出惟墜失簪冠尋於波面泛泛而至有介公者素好善事而請出家志甚懇切師竟不許介去師謂人曰今二人於此欲建大殿宇一則基址既立材木既豐未求匠者而匠者自至何哉材既備而功可成也一則指其立基之所窪坎未平一工未集匠者望之而去矣師在烟霞時張德昭有子聰明甫十六歲送之入山就學以其宿有深契前後所贈歌詩并畫二事理反復曉告者非一後出山省親而不復至師與德昭書又付以真實語其子內心領之雅之夙有仙分而不能自奮於塵凡師之度人也必審其才分淺深故於德昭之子呼小張哥而未嘗以名百方鎸誨而不能致介公孜孜切切而自請出家而卒不納其所處例如此在萊州立平等會自是遠近風動與會者千餘人其五會之榜略云平等者道德之祖清靜之元為玉華金蓮之根本作三光七寶之宗源普濟群生遍拔黎庶人人願吐於黃芽個個不遊於黑路玉華者乃氣之宗金蓮者乃神之祖神是氣之子氣是神之母子母相見得為神仙然則有真功真行澄心定意抱元守一存神固氣真功也修仁藴德濟貧拔苦先人後已與物無私真行也又有金蓮定分疏開明疏三光疏玉華疏平等會規矩及諸詩篇文多不載師後往返於登萊寧海之間及行皆留詩為别九月挈馬談丘三人西邁過登州太守紇石烈名邈者待以師禮及辭曰再會何時師曰南京後師羽化而邈適除南京副留守又指望仙門外畫橋語郡人曰他年逢橋必壞復一紀太守何邦彥以橋勢雄峭不利車馬遂命改之其逆知類如此達掖城又得劉公者始隨其母來謁師一見輒契諭以出家母欣諾之名以處玄號長生子遂行至是所謂馬談劉丘舉集席下矣故竹杖歌云海上專尋知友來兀誰堪可教依託昨宵夢裏見諸虬內有四虬能跳躍蓋預指而言之也所謂詩詞與其事迹始末各載於本傳師至南京憩於王氏旅邸時盂宗獻友之以同知單州丁母憂歸有神風先生杜哥者嘗預言友之四魁事凡所發莫不應友之以仙待之一日忽告友之曰元帥來我當參謁友之令童僕默踵其後杜徑入王氏邸中一膝跪見師方卧而閲書殊不少顧友之雅重杜及聞大驚杜再往始為一盻三往笑而視之杜乃雀躍而去友之因之就謁師閲書而不為禮問讀何書亦不答就視樂章集也問全乎師曰止一帙爾友之曰家有全集可觀也即為送至師自到京日使馬鈺等四人乞錢於市市及斤之鯉煮食之稱不及則不食友之頗惑默念道人看樂章集已非所宜又食魚必其斤重果何為哉他日問樂章集徹乎師不言但付其舊本友之檢閲其空行間逐篇和訖不覺嘆曰神仙語也即還沐浴更衣焚香請教日益加敬師自是不復食魚蓋以友之為大鯉故示意爾師命馬鈺召匠者造獨坐風車工畢師云近日火熁我眼不能見使燃燈遍照之鈺即頓悟又師自市四鯉穿而拖之入於邸中以羊肉二斤併煮之熟藏之月餘其魚肉皆臭敗令門人弟子食之時各戒羶葷莫有敢食者師遍問皆曰不敢馬鈺獨稽首曰師令食弟子食之師叱曰汝自不斷得欲託我耶遂與滿鉢師復曰到關西無此物與汝食之凡數朝先令鈺早食羊魚又令沽酒市天蒸棗蜜彈子師自食之詢鈺曰會得否鈺未悟即愈加痛教狂罵捶楚不分晝夜且曰汝一日自當悟矣鈺拜謝曰蒙師慈誨無所可報師曰惟修行則可報後入關始悟京中之事皆玄妙之教也臘月中時於鈺輩極煆煉之功踰往者百千錯行倒施一言一動悉受呵責以鈺等所乞錢物多市薪炭大然於所寢之室其室𥚹小令馬鈺談處端入於內劉處玄丘處機立於外內則不任其熱外則不任其寒處玄不堪而遁去師將設三子立於床下師曰丹陽已得道長真已知道吾無慮矣處機所學一聽丹陽處玄長真當管領之又顧處機曰此子異日地位非常必大開教門者也甫正月師與衆别曰今可赴師真之期矣馬鈺等乞遺言師曰吾昔已書京兆灤村吕道人庵之壁口占頌曰地肺重陽子呼為王害風來時長日月去後任西東作伴雲和水為鄰虛與空一靈真性在不與衆心同且戒勿哭言訖而蛻衆皆號慟師忽開目曰何至於此囑馬鈺以後事若達關西化我鄉人仍付之密語勿輕傳之鈺再拜而受又謂談處端等曰汝輩前程皆在馬公手遂書物外親眷詩云一弟一姪兩箇兒和豫五逸做修持結為物外真親眷擺脫塵中假合尸周匝種成清靜景遞相傳授紫靈芝山頭并赴金華會我赴蓬萊先禮師書畢奄然而逝享年五十八時大定十年正月四日也友之謂衆曰我既為弟子當主喪事日祭謹甚至靈柩西遷不少懈焉告其子曰五人受重陽王公點化我其一也馬鈺等至京兆灤村訪吕道人庵得所為之頌又唱和玉蟾李靈陽於終南師在南京以詩寄二公有首先一去三人同之句見醴泉史公密乃出舊圖而皆應合相與葺師之故庵師素不為鄉里信重及馬鈺至秦人方始追悔後鈺輩復往南京取其靈柩歸葬於劉蔣結廬三年然後各從所志馬鈺嗣其教與談劉丘者繼為宗盟而全真學者稱鍾吕劉為三祖又以師為祖師大元至元六年己巳正月國朝褒贈重陽全真開化真君其遺文全真前後韜光集行於世云臣道一曰皇不足則帝帝不足則王王不足則霸霸又不足道之不幸也至哉全真杰生中土轉澆漓以宗太朴化頑獷以慕無為一師倡之七真和之猗歟盛哉時當今之有國也力不侔於五胡德弗逮於拓拔綿綿之運信罔有矣然天啓玄元之教俾福被於群生斯道無喪以至今日全真之功也道德經曰大道泛兮其可左右萬物恃之以生而不辭功成不名有愛養萬物而不為主故常無欲可名於小萬物歸焉而不為主可名於大是以聖人終不為大故能成其大非全真之謂乎馬鈺師初名從義字宜甫一名鈺字玄寶更之也號丹陽子漢伏波將軍援之後本扶風人五代兵亂遷寧海世業儒祖覺字莘叟至孝通五經父師楊字希賢儀觀秀偉沉靜有度量以孝義稱幼時客有驚走擲油褶於家者視之兼金也具白其父令藏之以待旬日客方至即付之客謝曰吾為吕仙住幽谷村世以陶探為業得金兩鎰將鬻於市適監稅者逼逐賴公獲免請中分以報希賢却而不受吕曰君有黃向風誼後當有高士出其家他日訪幽谷人無吕姓者始知其異有子五人以仁義禮智信名之時號五常馬氏師次子也母孕時夢麻姑賜丹一粒吞之覺而分瑞時金太宗天會元年五月二十日也師在兒時常誦乘雲駕鶴之語及長為儒而不樂進取父愛其才俾掌庫物好賙濟而無私心由是得輕財好施名李無夢見而奇之曰額有三山手垂過膝真大仙之材因贊之曰身體堂堂面圓耳長眉修目俊準直口方相好具足頂有神光宜甫受記同步蓮莊居無幾丹成忠顯孫君以女妻師生三子庭珍庭瑞庭圭師嘗補試郡庠偶夜夢二人衣皆褐色其一素補其兩肩泣告師曰我輩十萬餘命在公所主言訖而去逐之入屠者劉清猪圈中壁上有字是我輩己亥十萬人大半已經辛巳殺此門若是不慈悲後世軸頭常厮抹既覺聞屠猪聲起視之則清之小子阿兒縛二猪其一肩白已殺之矣方悟己亥猪也辛巳清之歲屬也師疑其夢不祥使術者孫子元占之因以稽其壽子元曰公壽不過四十九師乃大感悟曰生死果不由人耶豫欲親有道之士學長生久視又師與客奕棋常自誦云此一著不錯當不死矣世宗大定七年七月同遼陽高巨才鄉人戰師飲於范明叔怡老亭酒酣師題詩云抱元守一是工夫懶漢如今一也無終日銜杯暢神思醉中却有那人扶皆不曉其意中元後一日重陽祖師自終南來徑入怡老亭戰師問布袍竹笠冒暑東來何勤如焉曰宿緣仙契有知己之尋既食瓜即從蒂而食問其故曰甘向苦中來問從何方來曰路遠千里特來扶醉人師默念言豫從前所作有醉中人扶之語此公何以得知因問何名為道曰五行不到處父母未生時明叔曰此十字耳曲盡妙意非神仙能出此語乎坐間談論尤與師合師邀歸私第而師事之始師夢一鶴從地湧出至是立庵於南園祖師指鶴起之地名之曰全真祖師必欲挽師西遊師以家事所繫未易猛棄祖師乃盛陳遠離鄉之高不離鄉之纍與之開釋師由是與祖師契義日深是歲十月初祖師命師鎖其庵日饋一食時隆冬在候風雪四入而庵之所有惟筆硯枕席布衾草屨而已然形神冲暢如在春風和氣中識者謂至人有寒谷回春之妙鎖庵之一日賜師梨一枚令啖之每六日賜芋栗各六至是月十一日分梨為二令夫婦共食後六日之芋栗旬日之梨為常期也其芋栗如初之賜梨則每旬例增其一至於九旬而積數為五十有五每分送則必以詩詞寓其微意師亦隨韵酬答解者曰芋者遇也梨者離也立遇則離分之義又分者損之又損也五十有五者天地奇偶之數也欲使離其親戚里閈以至無所不離耳又於夢中以十犯十戒獄警之八年正月十有一日啓鎖祖師謂曰將行在三四日之間從我歸去乃作一場奇怪哉鎖害風百日師於是以資産付庭珍輩以離書付孫氏入市求乞祖師因師夢中歌燒得白煉得黃便是長生不死方之句賜今名號又夢隨入一山及旦祖師呼曰山侗因為小字二月從祖師居崑嵛之煙霞洞忽患頭痛殆不可忍祖師令醫於家一日語門人曰馬公破道問何以知之曰昨夜夢飲酒使人往詢之藥用酒引不覺過多由是疾益甚人回報云馬公將死矣祖師鼓掌曰吾三千里外尋此知友寧復至於此極乎為其信之不篤故感此疾與法水即可愈矣乃寄真言云凡人學道先須依此一十二字斷酒色財氣攀緣愛念憂愁思慮自今後更無言可說如不依此便做靈丹性命亦不能了八月祖師在文登姜實庵預戒門人曰馬公來勿納九月朔師果至祖師傳語曰如今相見已後不相見要已後相見今不相見師乞已後相見遂居縣北蘇氏庵至十月初令師燒誓狀贈詩云擲下金鈎恰一年方吞香餌任綸牽玉京山上為鵬化隨我扶搖入洞天五月五日祖師在金蓮堂令孫氏燒誓狀别庵居之十一日召師至范明叔宅以詞贈之亦不收領或容暫見又復逐出後至南京始得共處矣祖師欲令化錢於寧海師以有不還鄉之願辭之祖師怒自夜撻之至旦從西行抵汴梁寓於王氏旅舍者久之祖師於師等尤加鍛煉責罵捶楚逆順莫測飲食起居悉示仙機是歲將終祖師辭衆云今可赴師真之期矣師乞頌曰我已書之關中矣十年春正月四日囑以後事而逝師於是同衆化錢負仙骨往京兆葬之劉蔣遺命也仍即祖師舊庵為環頭分三髻居喪者三年夫三髻者三吉字祖師之諱也師尊而戴之故多自稱三髻山侗嘗與丘劉談三人在秦渡真武廟月夜各言其志師曰鬭貧談曰鬭是劉曰鬭志丘曰鬬間師與諸公雖同出於重陽之門以祖師嘗有一弟一姪之語特稱師為師叔十五年弟運甫寄書邀師會葬其父母師答書云汝所葬者骨豫所度者神所行之迹有以異而報德之心無以異也遂以煉丹砂詞答之師嘗作十勸百不歌一日示衆云此非出己意亦是祖師之言因而成之也又問門人曰一日一夜凡幾時對曰十二師曰十二時中天道運行斡旋造化還頃有停息否對曰無知師曰學道者切須法天之道斡旋身中造化十二時中常清常靜不起纖毫塵念日就月將工夫既到神仙必矣十八年就化華亭劉昭信李大乘十餘人不得其一焉乃作詩有云錦鱗不得空潦漉收什瓊竿歸去來大乘還悟乃執弟子禮賜號曰靈陽子師環居華陽亭墻外有來禽一株枯已久矣四月四日師從環汲水以沃之俄有門人姚鉉携純陽真人家譜告點其句讀始知純陽四月十四日生於此樹之下師曰豫生於五月二十日至日此樹生葉矣大乘私謂人曰夏至不遠豈能復榮乎師作頌云天上三十六地下三十六天地入寶瓶七十二候足李請釋其㫖師曰此隱語豈易知之其應有日矣至其日緑葉藹然始知四月十四日至五月二十日相去三十六日天地相合為七十二候大乘因作異木記芝陽道友崔公閲其文疑其過情遂於四月移竹兩叢松一株於全真庵以移殖不時枝葉皆黃萎崔啓師曰此松竹可活否師答詩云窗外不惟君子緑庵前又喜大夫青之句遂令門人于知一去其黃葉以滌面水溉之不旬日榮茂如初師率其徒欲西游崆峒取道亭川官僚士庶請教者肩摩踵接惟恐其後師感其誠委曲開諭舋舋忘倦雖平日陸梁狂恣之徒率皆改心易慮以作非為耻二十年八月二十四日師往長安祈雨有詩云一犁霑足待何時五五不過二十五明日雨足二十一年師在京兆謂門人來靈玉曰關中謂衣裳舊重修潔者何名靈玉曰名拆洗師曰東方教門年深弊壞吾當拆洗之未踰旬官中有牒發事陜右道衆不勝震栗惟長春謂大乘曰吾道東矣豫雖在牒數不可出關若出關則關中教門掃地也師出關所至垂髫戴白迎送不絶至濟南有韓陶清南者慕邵堯夫之為人所居號安樂園邀師詣之乞師一語師曰夫道以無心為體以忘言為用柔弱為本清靜為基節飲食絶思慮靜坐以調息安寢以養氣心不馳則性定形不勞則精全神不擾則丹結然後滅清於虛寧神於極不出户庭而妙道得矣韓謝曰大道鴻蒙無所叩詰今聞至論得其門而入矣二十二年十二月師行化於文登漁者談氏之壻于公輩焚網於琅琊因召風回雪霽海市忽見之應士大夫有借蘇東坡海市詩韵以贊之者師亦繼作焉金蓮堂水素鹹苦師臨井呪之其甘如醴郡人號曰靈液構亭立碑以記其異師在文登七寶庵門人鑿井九尺而大石障之師乃示洞中仙詞云穿鑿須加二尺深甘泉自有應清吟鑿之一尺八寸泉自湧出師一日謂門人曰今日當有非常之喜乃歌舞自娛俄有報云壬寅十二月晦日孫仙姑化於河南府嘗為門人說內天地云人能常清靜天地悉皆歸人膈之上為天人膈之下為地若天氣下降地氣上騰上冲下和氣自圓矣又說四體用云行則措足於坦途住則凝神於太虛坐則勻鼻端之息卧則抱腹內之珠又聯句云水中焰迸三丹結火裏蓮生一性圓學道男兒無我相修真烈士沒人情石女吹蕭鸞鳳舞泥牛入海虎龍和玲瓏玉姹敲龍角惺灑金童跨虎腰此類甚多蓋道人身中事也師還海上初祖師嘗立五會師至則重闡焉至寧海一日為向屠者劉清舉及在家夢中事云計汝二十餘年所殺定數亦已足矣若不改業必入無間獄清悉焚屠猪之具於郭外二十三年四月師欲往芝陽高莊半途迓者百餘人或曰海市從旦至午見而未滅曩者雖間有之非清旦不可得而見也今師之來有此非常里之漁者鞠斌郭亨欒周輩不待勸誘聚網焚於桑島過午復有龍車鶴駕旌幢羽蓋之應洪儒巨筆成海市感應集下元日文山九幽醮師夜聞空中報云重陽真人至明日晡時祖師青巾白袍坐白龜於碧蓮葉上龜搖其尾衆會歡呼拜於泥中祖師回身側卧東南而去九月晦日與僧燭律師士人范壽卿於城北三教堂焚香宴坐鄜州王道師抱琴來鼓之日昃鄉人雲集師作歸山操云能無為兮無不為能無知兮無不知知此道兮誰不為為此道兮誰復知風蕭蕭兮木葉飛聲嗷嗷兮雁南飛嗟人世兮日月催老欲死兮猶貪癡傷人世兮魂欲飛嗟人世兮心欲摧難可了兮人間非指青山兮當早歸青山夜兮明月輝青山曉兮明月歸饑餐霞兮渴飲溪與世隔兮人不知無乎知兮無乎為此心滅兮那復為天庭復有雙華飛登三宫兮遊紫微未幾肆筆書委形贊其略云大哉登真路入青冥麟隨絳節鳳撁朱軿鳴鑾佩玉履虛步雲超受真誥上登玉晨蓋寓其歸真之意十二月祖師降辰醮于萊陽遊仙觀師屢瞻於雲表門人曹瑱問其故曰祖師并和公師叔至當赴蓬瀛于知一曰緣事浩大乞暫留於世師云堂堂歸去也作個快活仙人呼劉真一囑曰汝等望作神仙須要積功纍行縱遇千魔萬難憤勿退惰然後可領吾言我開眼也見瞑目也見匹來不在眼但心中了然則無所不見矣談話夜將二鼓風雨大雷震一聲師東首枕肱而逝是月二十有二日也是夜師叩酒監郭復中門郭素不相信出而邀之索筆書頌云長年六十一在世無人識烈雷吼一聲浩浩隨風逸書畢告别堅留之即趨而去又劉錫屋壁間留一頌云三陽會裏行功圓風馬乘風已作仙勸汝降伏龍與虎自然有分亦登天少頃人云師已逝矣方悟所見皆師之陽神也經七日神質不變遂葬于遊仙初師在崑嵛紫金山東華庵傍有大松數十枝葉變白半載不青師嘆曰松之白殆為我乎二十四年正月長生主醮於昌陽十八日已午間進士徐紹祖等見空中卿雲鸞鶴變態飛舞不可名狀重陽雲冠絳服丹陽三髻素衣現於雲際移時乃去遂碑記之二十五年邑人疑陜西徒衆盜去仙骨萊陽宰劉公啓棺視之貌如生乃更衣於金玉堂而復葬之師之歌頌有漸悟金玉摘微三寶行化圓成等集行於世大元至元六年己巳正月褒贈丹陽抱一無為真人云歷世真仙體道通鑑續編卷之一
