front:
  text: 歷世真仙體道通鑑續編卷之五羽五
  hash: sha256:a8cd48dbbc4a3db13a0f239cf037d68cc0753c6085574299dca3df93913a16b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0309_HFL_005-001a, image: hfl/0149/0149-174.png}
body:
  text: 浮雲山聖壽萬年宮道士趙道一編修張道清真君姓張氏諱道清字得一蒲騷里中人母王氏感異夢而孕宋高宗紹興六年丙辰五月二十日育真君於青牛山舍時紫氣騰空遠近咸以為異焉幼侍翁媪徙居郢之京山自為兒時氣宇澄清不茹葷醴達性命禍福或數日不食或一日入山半旬不反往覘之則見卧於嵒中有兩虎踞於側里人驚而神之又一日寢覺告母曰適往復州里女兄吳家方歸大一姐約以絲履果實來獻翌日果然由是父母亦信其神異二十七年上元日真君默坐前山見五雲縹眇間有萬神森衛中有帝君坐龍輿召真君授以祕訣靈文真君得之道望始顯後於其地建祠以記受道之所名曰帝授已而鄉里旱潦祈禱輒應人有疾病符水立愈由是京漢嚮慕者衆孝宗乾道元年捨所居為祠立玉帝睟容崇奉即光廟御書長森灣今萬歲觀是也二年真君幅巾藜杖遍覽襄漢名山至洪山謁主寺僧木闍老因與之講究玄寂之道喜木闍有慧性定力罄所得鄉里酬施金帛回施之八年隨州旱禱雨弗應木闍以真君靈異聞于郡郡委佐官躬往長森禮請真君至郡惟書天授神章一紙焚之甘雨隨降官民感忭願留香火祠奉真君不諾重過洪山木闍告於真君曰道本乎一教分則三願勿棄此山主張佛法真君曰一來一去各有定緣豫昨受玉帝旨謂興建香火之地分應斗牛界連廬霍逢九當興天命不可違也乃辭别木闍回住長森淳熙元年七月真君至龍虎山瞻禮天師受上清大洞籙以歸四年有僧徂超自天台國清寺來請師即往彼説過去事僧衆神之真君歸郢而蒲騷里人益景慕其靈異士民捐舍於青牛山育靈之地立祠宇一所以奉香火今崇寧萬壽觀是也十年真君有中都之遊時光宗在儲適齊安郡主病亟慈懿皇后念曰若得張先生來此病可療且地遠卒難至而李府御帶隨以真君見留府第聞于東宫有命召見真君呪棗水以進郡主飲之遂蘇光宗曰真哉神哉寵賜甚厚真君不受乃親灑真牧二字及鏤之牙牌以賜自此時一召見禮貌有加真君淡泊無為非問不答一日召次問起居之地對曰郢州長森灣光宗又親灑長森灣以賜十一年真君離京城回舊隱活民命者衆真君視長森祠宇尚隘弗稱儲君寶畫之光命其徒楊宗華等營而新之既成白于衆曰昔奉玉帝密旨建立道場别有其地山川之靈俟命已久將有行焉乃自郢入蜀歷參井泛湖湘過洞庭而下盆浦十四年春過康廬有仙翁揖于途曰拙者遁迹九宫遠來參迓願早訪彼山庶我輩有所倚藉真君唯之遂由富川上至通羊宿杉坑梵剎是夕山之阿有鄉耆張鎮者夜夢神人黃袍白馬直入其舍翌午真君至鎮異之傾意相嚮真君告之曰九宫靈壇湮廢已久吾將辟其基以為國家祈禱之地遂捫蘿登山數十里得其地於山之巔廣數十畝即圖志載之曰平壺臺是也日暮就宿山中趺坐松下夜半山靈喧聲從者駭然真君曰是山之神交相喜爾繼有赤蛇神龍之異平明從者告飢真君默坐方醒於袖中出齋豏各與其一異香猶熱食之且飽遂於壺臺之下定向子干標立道場而下曰吾且回長森秋期再來乃以符法授其徒楊宗華令先往開闢結茅為居權以安憩十五年戊申真君至七衆歡迎入山四方之民抱病求安者雲集隨叩隨應貧者助力富者輸財繼而真君靈貺匪一九宫開闢不日成之光宗紹熙元年召命不赴上遣使降香燭錦幡銀券入山設國醮徼福于民寧皇在儲亦有厚賚未幾朝命易庵為欽天觀慶元元年寧宗臨御慈懿居內宫每歲遣使入山厚有錫賚三年真君返長森五年上賜真君為真牧真人嘉泰四年寧皇親灑欽天瑞慶之宫六字敕修內司鋟梓改觀為宫賜賚駢渥六月上復加封太平護國真牧真人開禧二年敕江西轉運司撥賜間田又慈明皇后賜錢置莊供贍羽衆纍降特旨免役蠲租等是年虜寇京西長森實據其要虜既入境羽衆奔逃真君端坐堂上虜莫能犯及舉火焚祠煙焰自熄乃驚嘆曰此南朝得道仙子也三年夏初真君復還長森而九宫諸徒亦至省侍咸願請真君回九宫真君曰吾之行止非汝等所知吾創九宫道場乃奉天命為保國寧家安集道衆而設汝等當以進道為心勿以吾不歸為慮至七月五日真君鳴鼓升坐諭衆曰死生一晝夜也出入一乾坤也豫自歷劫以來應時出世隨念度人身在塵凡名書仙譜今將歸矣洞然八荒了無挂礙汝等各守戒行循規蹈矩以扶教法以報君親及索紙書頌曰幻質塵芳方度六紀憫一切情如渴赴水踏破鐵鞋尋跟索底一剎那間衆流截止仰沐宸恩可謂終始今日逃形湛然脫屣咦分明記得來時路乘彼白雲歸帝鄉頌畢珍重端坐而蛻遺表奏上蒙寧皇御批太平護國真牧真人張道清志識清虛道行高潔先朝眷遇極為優厚况祈禱雨暘纍獲感應今已羽化朕甚憫之可於內帑降賜錢令徒弟往長森灣迎歸九宫崇奉仰九宫主者就禁地內卜吉所安瘞不得滅裂仍不許所在邀阻付欽天瑞慶宫準此續降聖旨札下江西轉運司委都運趙龍圖督促其徙疾速迎回嚴奉徒衆承旨前往長森灣護龕迎歸涓吉入塔忽真君親附童子謂吾今神歸天府遺形何以葬為惜諸方善信遠來無以瞻敬於是立堂崇奉真相猶存嘉定三年續奉寧皇御書真牧堂三字鏤牌以賜理宗御極眷遇有加紹定四年加封真牧普應真人其事迹靈異君恩寵渥詳載九宫山真君全傳謝守灝先生姓謝名守灝字懷英永嘉人也生於宋高宗紹興四年甲寅三月二十二日午時先生少聰慧明敏年弱冠刻志於學一日有雲水道流訪其書齋道流曰貧道結緣先生與之揖就坐復起入內命茶道流點首曰欽哉古學問神仙也道流坐先生默然似有覺悟自是諸經子史一覽無遺勵精儒業天才該贍少年補中上庠後館于曹忠靖公府時清虛皇甫真人遭際主上每延問道德曹公感真人渡黃河之恩時延于家先生仰慕真人道德遂脫儒冠參禮真人隸籍羽襡真人之道首忖曹彌深次於先生為入室弟子焉先生博學強記議論宏偉每優道劣釋間有惡其分别輕重先生每言儒家有云能言距楊墨者聖人之徒也吾於道家亦云一日有士人聰明記問志尚釋教問先生曰三教熟優耶先生曰天下無二道萬殊同一初至理昭然何疑之有先生究竟經史出言有據懸河之辨莫能屈之一日復有難者曰盡信書不如無書先生曰如是則校之經史尚不可信足下之言尚可信乎其人無答欽服而去孝宗淳熙十三年江西漕使牒請知西山玉隆萬壽宫光宗紹熙之初朝廷賜觀復大師充行在壽寧觀管轄高士先生惟是究覽三教諸子百家之書作太上老君混元皇帝實録一部七卷奏聞主上盛行於時學問淵源聲動朝野紹熙四年再任玉隆萬壽宫住持寧宗嘉泰元年復任焚修管轄宫事一升經座撥妙指玄勾引三教高人問話應答如響間亦於寺院借座説法禪林尊宿亦多嘆服先生早遊江海多歷名山嘗遇至人授以旌陽石函記一部金丹之理愈造妙門內焉養真外焉混俗人莫知之也光寧兩朝眷遇優渥平生交友當代大賢超群拔俗人莫能及逮至晚年相貌清古鬚髮皓曰人咸謂活老君出世間中靜坐焚香誦書因觀自著混元實録撫几長吟曰知我者其惟是書乎罪我者其惟是書乎門人請益先生曰吾志在修文輔教明辨正邪立見已定一言不易後世毁譽任之也老耄之年顔容悅澤耳目聰明清夜對燈解書蠅頭細字嘗以所隱石函記一篇此一篇名金丹法象論後有人作一篇補遺法度乖謬恐誤學者書字如粟刻於銀葉之上藏於岩穴以俟骨相合仙之士焉晚年復辭往永嘉郡瑞安縣紫華峰創宫請額於朝為九星宫兹蓋先生湯沐之邑也住世引年七十有九於寧宗嘉定五年壬申二月十九夜忽夢天人下降謂先生曰太上有命趣召修真仙史記翌日午時具香湯沐浴辭别道衆書頌云造物逆旅主天地一蘧廬還汝已生有還我未生無頌畢正衣冠端坐奄忽而化後門人私諡修文輔教觀復先生祖元君元君姓祖諱舒又名遂道字昉仲唐廣西零陵永州祈陽縣人月孛化身九月九日生面黎黑色大圓眼露齒頭髮髼鬆插竹節叉手足黑而有毫身長七尺壽一百三十二歲幼存節操生而神靈厲志修真父母莫能禁之遂遍遊名山師事許真君鄭真人靈光聖母一日於西京清虛洞神化溪遇太玄夫人降于溪濱又從而師之蒙與俱至洞中凡數日變現男女歷試諸難終無怠志乃授以元始大道俾乘枯木順流隨止少焉木至故處失夫人所在矣由是會四派而一之職位清微元上侍宸復化身為清微察令昭化元君又號通化一輝元君統轄雷霆變相不一或紅巾搭膊跣足露腿威勢可畏或按劍坐石嘯命風霆或乘龍仗劍策役萬靈或金冠素服尊臨洞府性烈令嚴雖雷神亦加嚴勵功成沖舉居金闕昭凝宫主清微洞照府又曰金闕中靈凝照府主持教法惠濟生靈嗣其道者脈脈相承瓊室洞清郭元君福和耀真傅元君龍光道明姚元君紫英玉惠高元君元勳皇靈清虛華真人青城山通慧朱真人雲山保一李真人至眉山混隱南真人而清微道法尤闡焉火師汪真君真君姓汪名子華字時美唐玄宗二年甲寅生于察州汝陽縣年四十而三舉不第嘆曰年逾不惑不登仕版何面目見朋友乎吾將學黃老之學而臣於帝鄉矣遂與顔真卿同師白雲先生張約再師赤城先生司馬承禎遇祿山之亂棄家雲遊經南嶽祝融峰下修道九年不下山真卿為盧杞所陷使淮西為李希烈縊死師再遇紫虛元君親幸南嶽授以至道再修二十八年丹成道備貞元五年庚午正月七日奉詔白日升天黃雷淵真人姓黃名舜申福建建寧人幼而聰慧過人三教九流無所不通仕廣西時憲使南公見而奇之悉以神書授焉真人鈎玄探賾集成大全登門之士如雲後承詔命入覲繼而得旨還山隱於紫霞滄洲之上制授丹山雷淵廣福普化真人其所度弟子皆立石題名立石之前者三十人立石之後者五人而已前者各得一法後者盡得其傳如武當洞淵張真人化行四海獨露孤峰其道則多行于北西山真息熊真人獨在諸立石題名之後道闡四方則尤多行乎南土傳之安城彭汝勵汝勵傳之安福曾塵外塵外傳之浚儀趙元陽如上授受者皆為一代宗匠道德沖融內外光霽焉雷默庵真人姓雷諱時中字可權號默庵其先本豫章人後家于湖廣之武昌金牛鎮所居溪水回環東西二橋故又號雙橋老人生於宋嘉定辛巳年十一月初五日辰時幼習詞賦後通詩經三領鄉薦精心道學專務性理與九江吉甫親因己未庚申之難揭家依居吉甫甲子歲殿帥往太平宫酬醮師從其行夜宿太平宫之聽雨軒恍惚間見上帝親謂語曰卿陽祿無分陰官有緣不須留意功名是夕本宫知宫亦夢採訪真君告曰來日午刻可精嚴祀事五百靈官中有一靈官親降于壇炷香次日午朝殿帥謂師曰我困甚師可代燒香及至壇中知宫大駭方知師五百靈官中人也後知宫白于師師愈留心道法絶念功名復回居金牛鎮置壇祀呈庚午三月三日玄武誕辰師具表賀焚香朗誦度人經忽有一道人標格異常自外至謂曰貧道有一階道法特來授汝因出袖中書一卷曰可置此文於壇中齋戒七日後方可開看師受之置于香案回首道人已出不知所在方悟其為異人也入壇拜謝持誠齋戒七日焚香拜禮開看其文乃混元六天如意道法看畢壇中白晝如夜須臾雷火布滿雷霆辛天君立于案上曰吾奉昊天敕命付卿開闡雷霆之教普濟衆生吾教上帝為主以吾佐之以卿行之前日授卿之文者乃徂師路真君也卿名在仙籍七世為儒三世行法並無纖過當大興吾教路徂師當晉時親遇太上老君授以此法而是教專以度人經為主師每化導世人及開度弟子皆先令其精心誦經各獲果報且嘗論度人經旨以開後學其要在十回度人非惟十遍可以度人乃在平日修鍊自己以究返還之妙切須先度祖宗終得道備飛升上清經旨之明莫越是矣及儒釋二家博采旁求貫徹混融歸于一致四方聞其道行卓異及其門者日衆弟子數千人分東南西蜀二派首度盧李二宗師及南康查泰宇由是盧李之道行于西蜀泰宇之道行乎東南混元之教大行于世所著心法序要道法直指原道歌皆發揚混元道化之妙以至元乙未四月初五日沐浴更衣端坐臨午命盧李二師率諸門人諷度人經一卷畢即索筆紙書頌曰一輪明月照清穹萬里無雲光霽中自在道遙無一事圓融常與太虛同頌畢凝然而逝是年冬弟子奉葬于郡之顔山後雷霆纍降筆云上帝已升真人為玄都上相混元妙道普濟真君雷聲演教天尊莫月鼎月鼎真人姓莫氏諱洞一字起炎浙西霅川人莫合之裔也生而聰慧英敏過人酷慕道法神仙家之説乃與同郡西野沈震雷真人同師事鐵壁鄒真人得侍宸王真君九天雷晶隱書由是名著當時至若會稽混融韓公錢塘楊和玉蟾川諸公望重當代為道法所宗皆炷香座下由是道法愈重真人落魄無家隨所寓而止焉求其道者甚衆往往遺世絶俗離倫飲酒輒醉自樂天真其接門人多致叱吒試其誠怠之心而進止之有不堪者中道而廢至元丁亥被召赴闕下符法闡揚雷雨在指顧之間一時名動京師奔走後先者如雲如堵有不遠數千里及門而求道者有奉束修五十緡師受之一日袖之而去遇酒肆陋者乃入見貧寒者濟之有老病孤弱者必以物與之及晡而還緡皆罄矣門人中有道材法器者輒循循以進之其於雷霆之奧發揚底藴開示來學者多矣使者一符形每授門人各有不同是乃真人自立法以證派源考其玄微同歸一致自侍宸王真君演道以來惟真人與西野沈真人二派支流衍迤盛于西江昌于東吳扶教澤民莫有甚焉以延祐庚寅秋日方正午趺坐問弟子曰是何時也弟子曰日卓午矣遂索紙筆作偈曰七十四年明月也曾陰晴圓缺今日大地光明三界虛空透徹書畢端坐而逝顔面如丹金蓬頭金蓬頭永嘉人也名志陽號野庵素蓬頭一髻世因以為號生而不群自幼果敢大志不羈甫長慕道棄世慮若焚溺遂師全真道士李月溪月溪乃真常李真人之徒真常又長春丘真人之高弟也一見器之命遊燕趙齊楚求正乎先德焉得參事真常李真人南至袁州遇守城校尉顚軍子狀貌偉素日不與世接夜宿神祠師知其異乃師事之亦有所得歷遊武夷龍虎二山時龍虎主先天觀者傅師正館師于蓬萊庵庵據徴君聖井藐姑諸峰之會師攀陟崖壑侣鹿豕藉雲霧視以為常或夜坐盤石蛇虎值于前輒愕而逝去命其徒李全正趙真純築天瑞庵于峯頂四方聞其道者無遠邇凡病患者輒叩之即應以所供果服之無不愈參禮者日集嘗天旱登龍井召龍出語龍出聽踰時漸小躍入神中乃警以偈龍騰入水少頃天大雨元統癸酉復隱武夷山居玉蟾之止止庵浙東元帥李太平聞而禮之謂曰命嚴則民治心清則欲寡李益敬服或有妬者謀以藥毒之師預知命其徒鑿池㶆水果服浴而出之安然今名吐丹井至元丙子歲正月一日其同學桂心淵世稱桂風子坐解于廬山師聞之四月十日令徒書一頌坐逝越十三日面頳若栗肢體溫軟猶生瘞於庵側所受弟子則勞養素郭處常李西來張天全殷破衲方方壺皆以道聞於世歷世真仙體道通鑑續編卷之五
