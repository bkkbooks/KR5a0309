front:
  text: 歷世真仙體道通鑑續編卷之三羽三
  hash: sha256:7ae9db813a9cd3342ea3debd46e69a56f663f5c7202ea2ca101979d1a69522c1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0309_HFL_003-001a, image: hfl/0149/0149-094.png}
body:
  text: 浮雲山聖壽萬年宮道士趙道一編修王處一師名處一寧海東牟人玉陽其號也金熙宗皇統二年壬戌三月十八日母周氏夜夢紅霞繞身驚寤是日乃生甫七歲嘗氣絶仆地移時方蘇母驚問曰汝何為而若是曰但知熟寐不知其他師因悟生死之理一日偶至山中遇一老人坐大石謂之曰子異日揚名帝闕為道教宗主遂摩頂令去又嘗聞空中人問云汝識我否對曰未識也曰我玄庭宫主也是後狂歌謾舞冬寒跣足單衣顔色不變忽作頌自歌云爭甚名競甚利不如聞早修心地自家修證自前程自家不作為群類弱冠或告以婚事笑而不應世宗大定八年師在文登牛仙山庵居人告以祖師至即詣全真庵請為門弟子祖師知其為玄門大器遂從其請二月晦從祖師至崑崳煙霞洞乃授以正法及今名其母拜祖師亦願學道師知其貞潔以德清名之號玄靖散人九年四月師在鐵查山祖師與丹陽輩數人自文登將歸寧海取道龍泉時日方熾祖師執傘而行丹陽輩從之其傘忽騰空而去自辰及晡墮於師庵之前龍泉距查山幾二百里柄內得今號又曰傘陽子此字祖師撰之也暨有七人之名師在馬談劉丘之次故祖師有云傘竹通為七個人以應金蓮之七數也又云結竹金丹出頂上五光射透彩雲棚九月祖師西邁師隱於雲光洞常臨危崖翹足駐立不移者數日人以鐵腳仙人目之師九年煆煉心地開明是後數往來於齊魯間二十二年秋居寧海丹陽真人來自關中同宿於金蓮堂從容謂師曰重陽祖師不遠數千里提挈吾儕吾儕殊無以報不愧於心歟且得道之士苟利其身功不及物恐非弘濟之旨誠欲光昭先師之德莫若彰玄應而福生靈公今抱道藏器而獨善其身無乃不可乎師曰且道無同異緣有行否先生道備一身德光四海使天下之人望風而敬服者無他是道興而緣行也今貧子緣之未行姑猖狂以混世耳丹陽然之二十七年世宗徴赴闕凡所應對大副宸衷館於天長觀者久之上聞有以鳩酒害師者遣使詢其酒之所自來雖至再三終不之告但託疾而已上聞益深嘉嘆乞還山侍親從之二十八年二月復詔至闕建修真觀賜金書篆額俾居焉二月主萬春節醮事八月得旨歸仍賜金帛巨萬辭不受十二月上弗豫遣使召師師謂使者曰何來之晚恐不及重睹聖顔矣明年春逢哀詔於涿郡固辭東還章宗承安二年七月徴見於便殿問以養生之道師以無為清靜少私寡欲為對又問性命之理師言內丹之説以心運氣是皆無為自然斡旋造化玄元至道不為而成者也上曰非朕所得而議乃問以治國及邊境事所對莫不允合上心又謂曰先生凡有所問而必知之何也師曰偶然爾上曰毋讓朕願聞之師曰鏡明猶能鑒萬物而况天地之鑒無幽不燭何物可得而逃所謂天地之鑒自己靈明之妙也上嘆曰清明在躬氣志如神嗜欲將至其兆必先先生之謂也明年春奏母氏壽垂九帙乞還侍養上賜觀額及體玄大師號物禮甚厚三年癸亥上命亳州太清宫兩主普天醮事具戒度為道士者千餘人得遇師之降日門人畢集師之母曰我今年耄如何得歸師言壽期或在今秋之七月也母因有不貪生不懼死之語及期得疾師乃速營葬事凡二十有五日而逝逝之日人皆聞異香馥郁管絃清雅移時方止北京按察使前參政孛术魯公久佩師旨訓名尊道凡與師遇或預言雨降之期或告以後會之處歷歷皆應一日詣聖水致懇而言曰尊道於神仙但聞其名自遇師之後凡伸祈禱必垂嘉應行止會遇示以預知深愧塵凡不能從雲水之遊事與願遠徒增悵然也七年元妃施道經一藏驛送聖水玉虛觀觀之水洞前有大石斜出數丈俯其下過者懼懾一日集衆謂之曰大石今宜去之鎚鏨具舉攻之數日師問云幾何對曰百分之一爾師笑曰汝等安能去此遂躬詣其傍運鎚三擊聲若雷霆響震岩谷其石乃墮見者莫不悚然貞祐四年文登令溫迪罕龜壽迎師歸縣之天寶觀明年四月二十三日師語門人曰群仙已約我矣言訖沐浴冠帶焚香朝禮十方乃辭世師之歌詩有雲光集行于世大元至元六年己已正月褒贈玉陽體玄廣度真人先是明昌改元重五日萊陽縣劉植以無嗣告師曰公富而好禮未應絶也然吾稟之上蒼六月望日詣其居而植為置具師曰特來送嗣豈可以常酒相待耶庫之西北所封者妙醖也植往索之得煮酒一器師曰不惟此酒嗣亦如之索紙書一頌後批四四應真四字明年四月十有四日而生子乞名師曰已與之矣植良久曰四四則人所共知應真二字是其名否師曰是日純陽降世非應真乎遂名之至於叱遲金愈歷年之疾為潘信起凶徒之死卧凍雪於趙實之門復鳴雞於羌侁之架冬單衣而奕棋瓶無底而貯酒傳道則有山鳴谷吼之應書符則有鬼怪濳出之靈此類甚多是皆師應世之迹具載别記兹不備録焉郝大通師名大通字太古寧海人廣寧其號也金熙宗天眷三年正月初三日生世為宦族郝朝列之從弟少孤事母甚孝嘗夢神人示以周易祕義由是洞曉陰陽律曆卜筮之術厭紛華而樂淡薄隱德於卜筮中世宗大定七年祖師至寧海見其資稟高古所習不凡遂以背坐之機感發之翌日晚於朝元觀付以二詞言下領悟如走萬里迷途一呼知返蓋其根本知覺分上夙有薰染之力故耳既接言論其相與固結日深一日八年三月從祖師至崑崳煙霞洞請列門弟中而求法焉祖師乃名之曰璘道號恬然子仍以弊衲去其袖畀之曰勿患無袖汝當自成蓋傳法之意也今之名號自言遊鳳翔路中偶得之師在文登常携瓦罐乞食經半載誤觸之碎祖師别賜之題頌於其上云撲碎真灰罐却得害風觀真待悟殘餘有個人人喚九年秋馬談劉丘四師從祖師西去留師與玉陽居查山後玉陽以師不立苦志忠告而勸激之師遂西訪四師四師方廬於祖師墓喪禮終師欲與同處聞談長真激以隨人腳跟轉之語明日遂行至岐山遇神人復授以易之大義十五年坐於沃州橋下而不語常為小兒輩戲纍磚石為塔於頂囑以勿壞頭竟不側河水泛溢而不動而亦不傷如是者六年其所守蓋如此真定少尹郭長清過之下車致拜禮所贈甚厚覬師一顧終不能得嗟異而去二十二年居真定每升堂講演遠近來聽者常數百人有問答歌詩周易參同演説圖象總三萬餘言目曰太古集後至咸平與高士王繪賢佐遊賢佐相從亦常十數人占筮之應十得八九師則無不應者由是賢佐輩皆神之請當師席而受其祕義賢佐因之名動闕庭師嘗欲作易圖遽然索筆其徒范圓曦以粥熟告師曰速持來我方得意筆入手一朝揮三十圖至於天長預告侯子真之火恩州夜入王鎮國之夢人之休咎道之行否兵革所臨之期凡有言之於其前莫不驗之於其後史館張邦直子中所謂警動人之耳目其徒往往能道之故不著云東海郡侯崇慶元年十二月三十日仙蛻於寧海先天觀春秋七十有三前此三年令預修葬事及期果然大元至元六年己巳正月褒贈廣寧通玄太古真人云和德瑾玉蟾子姓和名德瑾秦州甘泉人嘗為州吏未嘗取非義財日與一道者談玄笑飲後道者臂梟而來曰此禽怪哉眼大而不識人玉蟾子不悟其旨忽道者以惡疾而殂玉蟾子備禮葬之不數旬有老嫗踵門而謁曰昔亡道者吾子也奈老無依何玉蟾子贈之金帛嫗曰但得發壙一視吾子誠無憾矣玉蟾子率鄰里與嫗發壙開棺失尸所在惟存贈嫗金帛回視嫗亦失焉由是感悟棄家入山後遇至人得九還金液之妙遊終南山行其所傳日益精進以至沖和周密妙用通神逮重陽王君遇真遂結為仙林之友莫知所終李靈陽靈陽子姓李名字俱不聞京兆人也為人沈默寡欲學問該博而樂仙道遇道者授神仙抱一符火大丹之訣頓拋塵俗朝修暮煉積之歲年至乎大妙與玉蟾重陽二子為終南林泉之友嘗謂重陽子曰子他日道化九圍教行四海非吾輩之可及金世宗太定己丑重陽携四真人入汴有詩寄云和公與李公首先一志三人同逮重陽登真丹陽挈丘劉談三子來謁一日二君預留錢於終南食肆曰今日有仙客丘劉談馬者至則待之四師至食人道姓以邀之丹陽笑曰公何知豫等姓氏曰和李二仙君預有付囑故知之時二君泊太平宫四子食畢就宫參謁自此真門之下咸以師叔稱之皇甫坦先生諱坦字履道皇甫其氏也其世代地里莫詳或云嘗居臨淄及瑕丘得三避五假之術後遁迹於蜀之峨嵋一夕行風雪中忽聞人呼曰子有道氣吾當度子先生一顧見一道人卧茅簷下令先生與之抵足而睡覺暖氣自足而達浹身徹頂如在春風和氣中比曉其人振衣拂袖而去先生詢其姓字但云他日來靈泉相尋先生後往靈泉觀求之見唐隱士朱桃椎書象蜀人稱妙通真人方知所遇乃朱真人也先生一日與一道人偕行復遇妙通於途授以冬瓜一截蔥數莖曰前去伺我城中酒肆如其言而往抵暮及關視瓜輒為人首而蔥則髮也水所霑衣皆血痕關吏執之併録其同行者先生獨以身任咎初不辨所從來遲明將以解府瓜蔥如故衣血亦亡官吏驚異慰諭而遣之出則妙通已伺於户外笑曰子真可教也乃烹瓜對酌遂授以虛坎實離之旨復引泛舟舉杖擊水以示波平復擊如是數次顧曰會麼先生唯唯而已遂傳內外二丹之訣自是隨在修持寒暑喧寂不問平居多宴坐而不寐兩足外踝皆平偃一日見頂門有珠光焰因歌曰山頭紅日出藥苗新欲將心事付瑶琴知音少絃斷有誰聽識者以為丹成之驗方周遊海內救人利物以積功行宋高宗紹興二十七年顯仁皇太后得目疾國醫不能療忽夢黃衣道人長髯廣耳太后問能醫眼否曰能太后曰若醫得我眼明即是我師父也覺而異之以語高宗皇帝有詔物色之時先生南遊自稱眼醫臨安守張稱見畫象以先生惟肖遣人求得於建康遂以名聞召對便殿問何以治身先生對曰臣之治身猶陛下之治天下也心無為則身安帝王無為則天下治上善其言即白太后明日宣入與俱至慈寧殿先生敬為皇太后噓呵布氣良久翳開目明認見先生喜曰真昨夢中所見師父也由是宫中皆呼先生為師父仙韶位有甄娘娘病躄纍年踊而後能步太后命先生亦為布氣即釋踊而行及將還山留一扇於禁中曰有發寒熱者以此扇之當差未幾宫中多患瘧用之皆驗陛辭之日兩宫賜賚甚厚先生止受香茶衣服而已上亦高之因其行命賫御香致禱於青城山丈人觀訖事還詣安靜觀焚香即妙通之舊隱也遂奏請重新觀宇且贊其像曰靈泉真人兩蜀鍾秀馬溪道成茅茨賦就歷世救物示迹不有惟我知師再拜稽首明年回至忠州仙都觀平都山巔有巨柏雷震枯死二十年矣先生呵氣祝之不逾月枝葉再榮王從道記其事刊於石繼而上遣使賜手詔慰勞且召之曰先生清標孤映寄迹物外秕粳塵俗嘯詠煙霞信可樂也去秋為别俯仰周歲興懷晤言馳神緬邈計青城會友於元覽白雲遂無心於帝鄉也秋涼甚邇不知何日可相見願早踐言則騎氣御風泠然無難行且湘雲橫素桂子吹香燕館超然下風問道虛懷結想久矣專此為問殘暑在序益保清虛先生得詔即行比至賜紫衫皂衫絲履令間門引見從容問長生久視之道先生對以清虛寡欲為先先損諸欲莫令放逸丹經萬卷不如守一上嘉嘆久之曰真人也由是傳聞中外競以真人稱之他日又問先生對曰仙人道士非有靈積精纍氣以成真深契聖意嘉嘆再三曰此其所以為真人也因書其語于扇以賜仍寫道德黃庭陰符經賜焉時姑蘇敳道僧亦聞道之士召至先生已在座初不相識道僧入長揖萬乘而見先生即拜賜坐辭問其故曰仙階有高下真人在上我不敢坐強之乃坐於地後先生乞還山上留過郊祀時久雨上以為慮問於先生以必晴對及將宿青城復遣問焉先生進詩曰夜靜天中星歷歷曉來壇上月娟娟皇圖鞏固中興業帝祚遐昌億萬年至夜果晴上命為先生設幕次嘉會門賜香燭飲食以御前金器排辦駕回先生起居太上式車顧而微笑即日宣押賜宴先生因賦每蒙天一笑遂與物為春之詩上大喜尋復乞還山上固留不可乃命築庵廬阜以便於宣召又繪先生像御題其上為皇甫真人像而贊之曰皇甫高士眉字列仙以道興世孰計其年間雲在空孤鶴行天掀髯一笑同乎自然封以錦囊命內侍省都知張某去為持示先生復携入留禁中後移置於德壽宫道院太后賜金為建庵費先生提所著道袱辭曰只此便是臣庵無所事金卒不受太后乃命幹辦御藥院董仲永袖金濳置於先生卧榻而去啓行見之即封付臨安府繳納比至廬山太后復遣幕士仰立賫金就賜先生復固辭尋降付江州令鬻錢以給先生不得已而乃用太后旨意建普天大醮二壇祈福皇帝仍普及生靈復以餘錢繳納太后不許即命兩府曹勛白雲處士鄺守寧以其錢仍益金為先生置兩莊於山之南北北曰銅盤南曰丹桂收歲入以接待雲水之士先生始遂築庵于蓮華洞撥雲遊之士而居焉孝宗皇帝隆興元年太上皇御札詔先生曰自退處别宫日以頤神養志為事思見風采款親道話幸早命駕少同間適專信奉迓用伸至懷既至宣見於康壽殿乃命館于西湖顯應觀西齋堂以兩府曹勛館伴宣對錫宴至數次後先生遊天台康壽殿産靈芝復遺兩府傳宣撫問賜沈香二百兩并以畫芝草扇親書御贊于上賜之乾道改元初方遊武當上皇遣德壽宫使臣陳球宣召追及於襄陽繼命兩府曹勛迎勞於道乾道二年二月至行在所復命館伴於顯應觀明日即宣入賜宴又明日幸其館命登御舟泛湖遊園後屢侍燕間談修真之旨遂賜御書靈寶度人經壽聖皇后書清靜妙經孝宗初登位嘗傳旨宣問先生回奏凡百言大略請審刑德割嗜欲推衛生之理以為治至是引對內殿賜曲燕宣勸至數十爵仍賜內府香茶乾道三年上皇元命之歲欲致禱于灊山及廬阜青城謂先生精誠足以感格即命捧兩宫御香以御舟津送至九江逮至青城焚香始祝黃龍為見初欽宗靖康之難兩府曹勛自燕京持徽廟御札回至黃河無舟夜遇先生於河濱束葦筏與俱渡至岸僵且死先生然葦以燎之良久乃蘇問姓名不告曰宋真人以公為安社稷計故令我來渡公後三十年當見公於錢塘言訖而别及先生應召與之相會語及舊約兩府追記風貌感泣下拜待以師禮其贈先生詞有云自嘆孤身早歲黃河渡口蒙情蓋序前事也上皇知之故每有宣問迎勞館伴必屬之先生建閣寶藏所賜御書上皇賜名紹興焕文之閣亦命兩府書榜先是廬阜庵成道流聚食日衆而汲水於澗以為苦先生一旦荷鍤引人斸庵側之地不一二尺有泉涌出石隙間清洌而甘亢旱不涸及赴召上皇偶詢山居之事因以奏聞壽聖皇后在坐曰先生在處必有神物護持也上皇即命為神泉御書二字以賜乾道九年復賜御書清虛之庵四字為門額仍歲賜勑牒度道士以奉香火先生前後四赴召命自上皇退居德壽恩眷益加每至宴勞外賜上尊珍膳無虛日先生再還自青城掃迹朝市惟德壽宫歲時遺問不絶屢遣中使至山宣喚皆力辭不赴淳熙五年秋忽言我將遠適不可不辭太上皇治裝欲如行在所中輟不行九月二十三日遂口授詞旨令門人作遺奏以進凡士夫道釋與厚善者亦具辭書明日晨興沐浴更新衣至日中升堂集衆焚香取御書并宣賜衣物付弟子輩曰我將遊乎無何有之鄉此太上皇所賜當留以鎮名山汝等向後接續住持代相傳授寶而藏之毋違吾訓又曰道不負人大家努力珍重珍重語已拱手垂足坐於繩床而化三日不欹不倚容色紅瑩髭髮如漆入龕身猶柔暖於是弟子曹彌深謝守灝等與其徒二十有四人以十二月壬辰奉遺蛻藏于庵側之左隴從遺訓也初治壙得白蟾於數仞之下五色士中又得古斷碑有冷翠凌舟四字將窆之夕天燈下燭比曉方沒會葬者二千餘人乃發紼有仙鶴隨之盤旋其上窆已乃去羅晏羅赤腳名晏閬中人少時遇異人携以出歸而有所悟解宋徽宗宣和中或言於朝賜封靜應處士張魏公宣撫陜蜀延致軍中金虜攻擾鳳關精鋭迭出大將吳玠禦之殺傷相當猶堅持不去公以為憂羅曰相公勿恐明日虜遁矣有如不然晏當伏斧鉞以受誤軍之罪明日果引去公始敬異之連奏號太和沖夷先生好遊漢州每至必館於王志行朝奉家王氏傳三世見之矣其事志行夫婦禮甚敬曰吾前身父母也高宗紹興六年丙辰蜀大飢志行買妾於流民中姿貌甚麗羅見而駭曰此人安得在公家留之稍久得禍將不細當為除之命煮水數斗取竈下灰一籃喚妾前以巾蒙其首而注湯於灰上煙氣勃勃然妾即仆地蓋枯骨一具也羅曰渠來時經女儈否今安在曰在某處亟呼之俟且至則又以巾蒙枯骨復為人形舉止姿態與初時不異遂付與儈而取其值志行從弟志舉登第歸羅見之他所授以書一卷緘其外戒曰還家逢不如意事則啓之及家三日而聞母訃試發書乃畫一官人緑袍騎馬前列賀客最後輿一柩凶服者隨之哭廣都龍華寺宇文氏功德院也羅與主僧坐勿起曰房令人來僧驚問何在曰入祠堂矣僧謂其怪誕明日宇文時中信至其妻房氏正以前一日死嘗往揚州鎮館於陳氏夜如厠奔而還曰異事異事適四白衣人踰墻垣入圃中陳氏皆懼羅曰無預君事明晨當知之及日圃人告羊生四子紹興三十年在鹽亭得疾寓訊如溫江求迎於李芝提刑家李遣數僕來羅病良愈即上道行戒其僕曰自此而左惟金堂路近且易行然吾不欲往願從廣漢或他塗以西幸無誤僕諾退而背其言乃抵古城鎮及溫江而卒蜀人以為年一百七八十歲歷世真仙體道通鑑續編卷之三
