front:
  text: 歷世眞仙體道通鑑續編卷之二羽二
  hash: sha256:e29d00b50895a2554d78e4cb789f39974320e3b9520cac6b62c8a7e8b37fa69c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0309_HFL_002-001a, image: hfl/0149/0149-050.png}
body:
  text: 浮雲山聖壽萬年宮道士趙道一編修譚處端師初名玉字伯玉後名處端字通正號長眞子蓋祖師授之也世爲寧海人以金太宗天會元年三月一日生生而骨相不凡六歲偶墮井其家人急救之則安坐水上出之无所傷又所居遺火巨楝折於卧榻前師方熟寢呼而起之神情自若人已知其爲異既入學記誦敏給同輩罕及十歲學詩一日其所親指木架葡萄令作詩有云一朝行上青龍架見者人人仰面看衆喜其醖藉長而倜儻不事邊幅以孝義見稱其於經史靡不涉躐尤工諸草隸因醉卧雪中即感風痺之疾自知非藥石可療乃暗誦北斗經以求濟急夢大帝橫空師飛起取之則諸星君坐其上師拜其下恍然而覺自是歸道之心遂决世宗大定七年聞祖師在馬丹陽家徑往乞備門弟子列祖師留宿庵中時嚴冬在候藉以海藻而不任其寒祖師展足令抱之少頃汗出如置身甑中黎明以盥手餘水滌其面宿疾頓愈由是願推誠心終身事之他日妻嚴氏怪師不歸就詰其所以師遽離之祖師復嘉其勇斷遂授以祕訣立今名號又贈詞有達眞譚玉之語其許可也明矣八年從祖師隱崑崳之煙霞九年從至黄縣盧山延眞觀觀有盧眞君出世之迹師於玉皇殿西壁題詩有杳杳飈輪去不迴鸞驂鶴馭破雲堆之句是歲冬從祖師遊梁十年春祖師蟬蛻於王氏旅邸同丹陽輩負仙骨葬于終南之劉蔣村治喪三年十四年復關東至洛陽朝元宫題詩云紫詔師眞歸去後未知孰繼大羅仙朝元宫寔朗然子登眞之所故迤邐至懷之修武有張八哥者如狂如癡識者以爲有道一日唱言於市曰來者譚先生神仙之總管也後居新鄉府君廟之庵因往獲嘉縣尋復寓衛州北關邸中新鄉之廟官温六忽夜見庵中燈火熒然竊視之則師面火獨坐温拜於前師微答不言而出温待乆不至迹之而不知所在急呼道衆白其事衆令朱四者詣衛質之主人曰先生自至未嘗出也朱迴吿其衆乃知其陽神也十五年乞食於磁州二祖鎮一狂徒問爾從何來遽以拳擊師之口尋致血流齒折而容色不變吐齒於手舞躍而歸於邸中見者咸怒欲使訟于官師但云謝他慈悲教誨時丹陽在關中聞而贊之曰一拳消盡平生業師家所見其有如此十六年至洺州白家灘一農夫病累月治療无方夢中遇一道者軀幹魁偉與之紅藥服之立愈次日見師愕然曰此夢中賜藥之師也欲以物酬師不領而去嘗與濬州王四郎者同合寸金丸師之所分治无不效王之所分效十四五互易之其效與否如前始知非獨藥之神亦道氣法力之神也十七年過高唐縣以茶肆吴六者奉待往來道侣甚勤乃遺龜蛇二字懸其肆初不知其爲譚師眞也一日鄰舍失火多所延及而吴肆獨存人以二字同純陽眞人辟火符蓋純陽嘗留題於博興縣之酒館縣被火其館不灾辟火符時人謂之耳又乞食宜村過渡新船就功將寘諸水聚人而挽之力不能動師因助之應手而去是後凡僧道渡者水工願設手焉東遊抵陽武縣北夜起見北斗交换星如車輪亟呼道衆觀之其星尚如鷄卵動揺未定乆之復故自後師念聖號甚謹衛州淇門鎮石孔目問師持念之故師云衆亦宜念今歲當有大水之灾衆莫之省是年河决王洪埽二十年復西遊至同州西里庵門人求親筆輒書龜蛇二字筆力遒勁有龍蛇盤屈之狀凡求書者亦多以二字與之蓋預指歸期人初不悟至乙巳四月一日仙蛻始應焉二十一年師在華陰純陽洞瘡生於首曰其將死乎衆莫知所對良乆曰今我未死逮生於足則死矣因示衆云六年煉盡无明火十載修成换骨丹湛湛虚堂无挂礙已知跳出死生關又云恰十年來學得癡騰騰兀兀任東西欲詢風子修行事垢面髼頭火滅時復至洛陽朝元宫之東得隙地數畝築庵居之二十五年夢遇重陽丹陽報以仙飛之期即令門人預營葬事適足生瘡遂書長短句云交泰一聲雷迸出靈光萬道輝龍遇迅雷重脱殻幽微射出金光透頂飛一性赴瑶池得與丹陽相從隨顯見長眞眞妙理无爲湧出陽神獨自歸書畢曲肱而逝矣大元至元六年己巳正月褒贈長眞雲水藴德眞人有水雲前後集行于世劉處玄師名處玄字通妙長生其號也金熙宗皇統七年七月十二日生於東萊之武臣莊其先九世孝友相繼宋太宗太平興國間朝廷旌其門閭特免本郡諸役其存恤親舊賑贍貧乏祖父皆有先世之風母王氏夜夢白衣翁呼出西南指之有玉樹而四枝枝各有一金葉令取其一曰他日必生異人意將取之其葉自墜於手視之則金蟬飛起而復投於口中翁失所在十有三月師乃生是夜紫氣二道從太基山横貫其家師自幼而孤事母以孝聞母亦有栖隱之志太基在武官南二里許山之陽有道士谷乃光州太守鄭道昭成道之所師嘗盤桓其間弱冠母欲議娶師以素有學道之志竟弗許金世宗大定九年春於鄰居壁間人所不及處得二頌其墨尚濡末句云武官養性眞仙地須作長生不死人是歲九月祖師與其徒丹陽長眞日東而來師與母俱往參謁祖師一見問之曰汝解壁間語否師不言四人相視而笑正所謂目擊道存之妙也祖師遺之詩云釣罷歸來又見鰲已知有分列仙曹鳴榔相喚知子意躍出洪波萬丈高乃授以名號未幾從祖師遊梁與馬譚丘三子俱一日祖師以詩示四子有我趁蓬萊先禮師之句又云我之辭世之語已留長安灤村吕道人家十年祖師羽化師與三人同負柩歸葬終南廬於墓側三年各聽所之因與長眞東入洛陽長眞居朝元師居市中士地廟不語者三年俄遷城東北雲溪洞徒衆日集忽指地云中有井三鑿之二丈餘得知下貫泉源人問何以知之曰曩世所居也二十年師指庵右馮氏園曰此我身後之縁四十年園之松栢死擡水西流其地當不售而得乃磨一碑埋於中云此縁興而碑立明年東之萊迨長春眞人西游道出雲溪門人陳其遺言其後東海郡侯大安二年運粟有司得長生觀額至宣宗興定三年四十年矣馮氏鬻其園圃蔡清臣以白金百兩得之請師之門人于離峰住持官伐松栢爲樓櫓之用又架雲橋取瀍水經觀西流以護城師之言於斯皆驗師既至萊築庵居之二十二年復居武官於是玄風大振四方受教者日益衆師遂註道德黄庭清靜等經是年丹陽自關中來師盛服見之丹陽責其侈師辯之曰予聞修行之人日消萬兩黄金丹陽曰日消萬兩黄金正好粗衣淡飯終薦證明萊州醮事二十三年十二月二十二日丹陽羽化明年正月姜守靜請師主醮於昌陽十八日巳午間胡璋徐紹祖等忽見瑞鶴盤繞空際祖師雲冠絳服丹陽三髻現於彩雲之上四月十五日登州醮海市見於竹島丹陽既殁師與玉陽同主葬事守墳百日乃使門人張順眞等持書詣洛請長眞主教一日謂順眞曰教門之事不在於我丹陽得遊仙吾得朝元後寄書中有歸逝之語兼委掌教事是年五月旱登郡守請師祈雨海市復見於竹島明日丹陽現於應仙橋之西北是日雨足二十九年師嗣長眞主教章宗明昌二年駙馬都尉出鎮萊州見歸向者甚衆而不見有異於人疑之命尉司欒武節追捕下獄俄頃市人見師於城南與道友接談如平日鄭押獄王受事亦見之意師逃出往視獄中師方熟睡二人驚駭具所見以白亟令出之又濰州温迪罕明威來見留之三日吿之曰汝可速歸汝庵欲壞矣既歸其庵无故人以病卒承安二年冬召赴闕勑寓天長觀問以玄㫖所對皆合上意臣庶見者无不敬焉就禮部給觀額五曰靈虚曰太微曰龍翔曰集仙曰妙眞明年三月得㫖還山大興靈虚之縁吴六先高明遠者憚師嚴厲密謀他日師令郝命清諭之曰我不了道而且性急請别尋師友二人相視而語曰我輩在心之事師能知之遂謝罪赤脚劉先生得疾一月不愈來乞早逝師振杖言曰汝向時有一年背道之愆世則以功準過陰理則功過各受其報前日之愆一年可準今既相遇一月亦可也劉因自誓而疾頓愈泰和二年主濱州醮正月中旬小雪初霽古城壕水復冰上現瓊葩玉樹不啻千數若珊瑚之狀尤多又杏花約及二千其小枝欑卧者殆不可勝計觀之者皆曰常人至誠尚可動天地感鬼神况有道之士乎有此感應也宜矣同知東京留守事劉昭毅定海軍節度使劉師魯致政之後與師往來甚相得三年正月二公請講師弟禮師謝曰公等皆當代名臣深荷顧遇吾將逝矣不足爲公等友輒示頌云正到崢嶸處何如拂袖歸我今須繼踵迴首反希夷二公覽之愴然是月二十八日大師淄王請主醮禀師所赴之期師云越八日二月六日師羽化乃八日也師魯哭之以詩云與君晩歲得相親相對忘形略主賔日望師來虚正寢忽驚仙去泣同人聞溪聲憶廣長舌見山色思清靜身從此誰爲林下客靈虛寂寞鎖深春時春秋五十有六大元至元六年已巳正月褒贈長生輔化明德眞人有太虛安閑仙集般陽大成大同神光至眞語録等集行于世丘處機師名處機字通密號長春子登州栖霞人世爲顯姓金熙宗大定六年師甫十九遞居崑嵛山七年聞重陽祖師於寧海全眞庵即往師焉重陽以詩贈之云細密金鱗戲碧流能尋香餌會吞鈎被予緩緩收綸綫拽入蓬萊永自由其器重可見八年春從祖師住煙霞秋冬居文登九年與丹陽長眞長生從祖師遊梁祖師日夕訓誘比之餘人尤加切至未幾祖師羽化四人護喪葬之終南廬墓三年各任所適師居磻溪者六年龍門七年養眞所受之於師者或時作歌詩以形容之由是聲名藉甚因京兆統軍夾谷公禮請遂復終南載揚祖教二十八年世宗召入見問以至道師首陳延生保命之要次及持盈守成之難又曰富貴驕淫人情所常當兢兢業業以自防爾誠能乆而行之去仙道不遠譎詭幻怪非所聞也上嘉納之館於萬寧宫之西以便咨訪五月召見於長松島七月復召見師剖析至理進瑶臺第一層曲又應制五明日賜上林桃師不食茶果十餘年至是一啖之因上賜也八月得㫖還終南賜錢十萬辭不受二十九年世宗崩道逢哀詔挽之以詩章宗明昌元年東歸栖霞大建琳宫勑賜其額曰太虚三年十月芝陽醮忽塵中數騎西來衆驚以爲驛傳俄頃塵數騎无音迹三夜聖前之杯酒酹者十餘始悟塵中之騎神人也五年九月主醮於福山方請聖聞天關震響北辰下紅霄燭地可辯纖悉泰和七年元妃施道經一藏驛送栖霞東海郡侯大安改元作學仙記二年作開天記宣宗貞祐四年師居登州上命東平監軍王庭玉賫詔召師歸京師曰我循天理而行天使行則无敢違也歲在己卯時金宣宗興定三年南宋嘉定十二年居萊州昊天觀時齊魯陷於宋秋八月宋遣使召師命大師彭義斌差宫衛行不起州牧以爲異師曰吾之出處非若輩所可知他日恐不能留耳是年五月元太祖聖武皇帝自奈蠻國遣侍臣劉仲禄請師其制略曰七載之中成大業六合之内爲一統是以南連蠻宋北接回紇東夏西戎悉稱臣佐任大守重懼有闕政且夫刳舟剡楫將以濟江河也聘賢選佐將以安天下也朕踐祚以來勤心庶政三九之位未見其人伏聞先生體眞履規博物洽聞探賾窮理道冲德著有古君子之遺風抱眞上人之雅操今知猶隱山東舊境朕心仰懷无已山川懸闊有失躬迎之禮朕但避位側身齋戒沐浴選差近臣備輕素車不遠數千里謹邀先生暫屈仙步不以沙漠遠行爲念或憂民當世之務或恤朕保身之術令朕得親仙座惟先生將咳嗽之餘但授一言斯可矣八月仲禄抵燕聞師在萊州又得益都安撫司吴燕蔣元等願以二十騎從行至益都其帥張林助以馹騎次維州得清河尹公十二月送至東萊傳所以宣召之㫖師慨然許行庚辰正月間弟子選可以從行者得一十八人二月入燕行省石抹公館於玉虚觀仲禄先遣人馳奏師亦奉表以聞四月作醮於太極宫師登寳玄堂傳戒有鶴自西北來焚簡之際一簡飛空五鶴翔舞其上明日師北行道出居庸遇群盜皆稽顙以退且曰毋驚師父五月至德興寓龍陽觀中元日醮午後傳戒衆露坐暑甚須臾雲覆其上狀若圓蓋移時方散觀中井水僅給百衆至是汲之不竭八月太傅移剌公請居宣德之朝元觀公構聖殿及祖堂欲畫其壁時當十月畫史以寒辭師不許曰鄒律尚能回春况聖賢有所扶持耶畢工果无沍寒之阻是月進表者曷剌迴有詔曰勑眞人丘師省所奏應召而來者惟師道逾三子德重多方命臣奉厥玄纁馳傳訪諸滄海時與願適天不人違兩朝屢詔而弗行單使一邀而肯起謂朕天啓所以身歸不辭暴露於風霜自願跋涉於沙漬書章來上喜慰何言軍國之事非朕所期道德之心誠云可尚顧川途之雖闊瞻几杖之非遥爰答來章可明朕意秋暑師比安好遣書指不多及又勑仲禄无使眞人飢且勞可扶持緩來其禮敬如此辛巳二月道友餞行於西郊至有擁馬首而泣者曰師去萬里外何時復舊瞻禮師曰三載歸矣五月朔抵陸局河日食之既七月至阿不罕山鎮海來謁言前有大山高峻廣澤沮陷不可以車留門弟子宋道安九人立栖霞觀率趙虛靜輩輕騎以行中秋日抵金山白骨甸皆云此地天氣陰黯魑魅魍魎爲祟過者必以血塗馬首厭之師笑曰道人家何憂此過之卒无所見抵陰山王官士庶道釋數百來見師因問其故俗乃曰景龍三年楊何爲大都護有德政惠及後人於今賴之十一月至邪迷思干大城之北太師移剌國公及蒙古師等載酒以迎大設幃幄因駐車焉太師以回紇歎食復多盜賊恐變生不測師曰道人任運逍遥以度歲月白刃臨頭猶不足畏况盜賊未至而預憂乎且善惡兩途必不相害衆遂安冬居等端氏之新宫壬午三月上旬阿里鮮至自行宫宣諭仲禄鎮海曰惟汝二人護從眞人來仍勑萬户播魯只以甲士千人衛之過鐵門達于行在舍館定入見上勞之曰他國徴聘皆不應今遠逾萬里而來朕甚嘉焉對曰山野詔而起者天也咨訪焉上重其誠實設二帳於御臣之東以居之約四月十四日及期有山賊之報上欲親往改卜十月望吉師乞還舊館上曰再來不亦勞乎師曰兩旬可矣上又曰无護送者越三日命宣差楊阿狗督回紇酋長一千餘騎從行由他路迴五月達邪迷思干諸官迎師入館時重五日也師既還館館據北崖俯清流十餘丈溪水自雪山來甚寒仲夏炎熱就軒風卧夜則寢屋顚之臺六月極暑浴溪中師之在絶域也自適如此其館中賔客甚少每以經書遊戲有詩云北出陰山萬里餘西過大食半年居遐荒鄙俗難論道靜室幽嚴且看書七月遣阿里鮮奉表詣行宫禀論道日期八月七日得上批答八日即行太師相送數十里二十二日田鎮海來迎及行宫上遣鎮海問曰便欲見邪且少憩耶師曰入見是望既見賜湩酪竟乃辭上曰師每曰來就食可乎師曰山野修道之人惟愛靜處上令從便二十七日車駕北迴在路屢賜葡萄酒瓜茶等九月巔渡航橋而北師奏話期將至上召大師阿海其月既望是夕上設庭燎虚前席以延之大師阿海阿里鮮入侍上問以至道師曰夫道生天育地日月星辰鬼神人物皆從道生人止知天大不知道之大也輕清者爲天天陽也屬火重濁者爲地地陰也屬水人居其中負陰而抱陽故學道之人知修煉之術去奢屏欲固精守神惟煉乎陽是致陰消而陽全則昇乎天而爲仙如火之炎上也其愚昧者以酒爲漿以妄爲常恣情逐欲耗精損神是致陽衰而陰盛則沉於地而爲鬼如水之流下也修眞者如轉石上山山愈高而進愈難跬步顚沛前功俱廢以其難爲舉世莫之爲也道人修眞煉心一物不思如太虚止水水之風息也靜而清萬物照之燦然悉見水之風來也動而濁曷能鑒萬物乎本來眞性靜如止水眼悦乎色耳好乎聲舌嗜乎味意著乎事此數者續來而疊舉若飄風之鼓浪也道人治心之初甚難歲乆功深損之又損至於无爲道人一身爾治心猶難矧夫天子富有四海日覽萬機治心豈易哉但能節色欲减思慮亦獲天祐况復能全戒者乎古之人以立嗣而娶嗣立而戒欲則孔子四十而不惑孟子四十不動心蓋人生四十以上血氣漸衰陛下春秋已高宜修德保身以介眉壽諭以服藥獨卧之理藥爲草精爲髓去髓添草譬如囊中貯金以金易鐵乆之金盡囊之所存者鐵爾夫何益哉服藥者何以異此飲食居處珍玩貨財亦當依分不宜稍過四海之外所有國士誠衆奇珍异寳其産雖多然不如中原天垂經教治國治身之術爲之大備屢有異人成道昇天者山東河北天下美地多出良香美蔬魚鹽絲枲以給四方之用自古得之爲大所以歷代有國者惟重此地爾今盡爲陛下所有奈何兵火相繼流散未集宜選清幹官爲之規畫量免税賦使軍國足布帛之用黔黎復蘇息之期一舉兩得兹亦祈福之一端爾苟授非其才不徒无益反爲害也初金國之得天下以創起東土中原人情尚未諳悉封劉豫於東平使經營八年然後取之亦開創之良策也山野微陳梗概其用之捨之惟在宸衷之斷而已上悦令左右書之於策此其大略也其詳見慶會録翌日上問以震雷事對曰山野聞國俗夏不浴於河不浣衣不造氈野有菌則禁其採畏天威也然非奉天之至道嘗聞三千之罪莫大於不孝今聞國俗於父母未知孝道帝宜教戒之上集太子諸王大臣諭以師前後之語且云天俾神仙爲朕言此汝輩各銘於心神仙之名始於此矣西游記云十月朔奏告乞還舊居癸未二月七日因入見而辭上曰少俟三五日前日道語有所未解者朕悟即行上獵東山射一大豕馬踣失馭豕傍立不敢前左右進馬遂罷獵師聞之入諫曰天道好生今聖壽已高宜少出獵墜馬天戒也豕不敢前天護之也上曰朕已深省以騎射少所習雖未能遽已神仙之言在我衷焉自是乃簡出三月七日又入辭制可而所賜備極豐腆皆辭之授尊重安慰之㫖以寵其歸因命阿里鮮護師東行送者皆泣别至阿不罕山過栖霞觀至五月中師不食但飲湯而已衆諮之曰師奚疾師曰予疾非爾輩所可測聖賢琢磨故爾是夕尹清和夢人謂之曰師之疾公輩勿憂至漢地當自愈六月晦抵豐州宣差俞公請止其家奉以湯藥輒飽食是後如故衆相謂曰清和之夢驗矣至雲中阿里鮮欲招諭山東請與清和行師曰天意未詳雖往何益阿里鮮再拜曰若國王臨以大軍生靈必遭殺戮師曰雖救之不得猶愈於坐視也從其請八月至宣德居州之朝元觀河朔州府王官將帥以書疏來請者若輻輳然師答云王室未寧道門先暢開度有縁恢弘无量郡方帥首志心歸向恨不化身分酬衆望甲申二月朔居縉山之秋陽觀燕京行省石抹咸得不宣差便宜劉仲禄各持疏懇請住太極宫許之乃度居庸初師之出武川也衆請還期師曰三載歸至是如其言是月曷剌至自行在傳㫖神仙至漢地凡朕所有之城其欲居者居之衆官咸曰師許太極矣請无他議是後道侣雲集玄教日興乃建八會曰平等曰長春曰靈寳曰長生曰明眞曰平安曰消灾曰萬蓮求法名者日益衆常以歌頌示之時復出遊故園瓊華之上從者五六人宴坐松陰或自賦詩或相屬和夕陽在山澹然忘歸乙酉春師折梨花一枝持賜寧玄居士張公去華公重其賜瓶以養之至秋結實二十有四无異其樹之生者時以爲祥去華乃誠明之父也師之寓意微矣哉延祥觀枯槐一株師以杖遶而擊之云此槐生矣及今榮茂他槐莫及九月初宣撫王楫以熒惑犯尾宿主燕境灾將醮以禳之問所費師曰一物失所猶懷不忍况闔境乎比年民苦徴役公私交困我當以常住物給之但令衆官齋戒以俟行禮醮竟之夕宣撫喜而賀曰熒惑已退數舍我輩无復憂矣師之德感何其速哉師曰予何德祈禱之事自古有之但恐其不誠爾丙戌五月京師大旱行省請師主醮雨乃足僉曰神仙雨也名公碩儒皆以詩賀丁亥五月復旱在京奉道會衆請作醮師徐謂曰我方留意醮事公等亦建此議所謂好事不約而同也仍云一日爲祈雨醮二日爲賀雨醮三日中有雨是右醮家瑞應雨過三日非醮家雨也或曰天意匪易度師對衆出是語萬一失期能无招衆口之訾也師曰非爾所知也後皆如師言是月門人王志明至自秦州奉㫖改太極宫爲長春瓊華島爲萬安宫仍賜以虎符凡道家專一委神仙處置六月師不出明日雷雨大作人報云太液之南岸崩裂水入東湖聲聞數十里黿鼉魚鱉盡去池遂枯涸北口山亦摧師初无言良乆笑曰山摧池枯吾將與之俱乎七月四日師謂門人曰昔丹陽嘗授記於予云吾殁之後教門大興四方往往化爲道鄉道院皆勑賜名額又當住持大宫觀仍有使者佩符乗傳幹教門事此乃功成名遂歸休之時也丹陽之言一一皆驗吾歸无遺恨矣九日登寳玄堂留頌云生死朝昏事一般幻泡出没水長閑微光見處跳烏兔玄量閑時納海山揮斥八紘如咫尺吹嘘萬有似機關狂辭落筆成塵垢寄在時人妄聽間書畢而逝春秋八十便宜劉仲禄揮涕而嘆曰眞人入覲以來君臣道合離闕之後上意眷慕未嘗少忘今師既昇化速當聞奏自是四方赴喪者哀慟如喪其親戊子三月朔清和建議爲師構堂於白雲觀期以七月九日大葬六月霖雨皆慮有妨七月初廓然晴霽及啓棺容色如生觀者如堵三日藏仙蛻於堂異香芬馥者移時既寧神大雨宣撫王楫會葬自爲主盟親榜其堂曰處順至元六年己巳正月褒贈長春演道主教眞人師之歌文有磻溪嗚道集行於世歷世眞仙體道通鑑續編卷之二
